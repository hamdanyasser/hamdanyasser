<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="nameD" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%"   stop-color="#F5F1E8"/>
      <stop offset="55%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7CCDB"/>
    </linearGradient>
    <radialGradient id="glowD" cx="35%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#1A2238" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#0D1117" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FBBF24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes float-a { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes float-c { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,-4px); } }
    @keyframes pulse-rule { 0%,100% { opacity: 0.85; transform: scaleX(1); } 50% { opacity: 1; transform: scaleX(1.06); } }
    @keyframes sweep { 0% { transform: translateX(-400px); } 100% { transform: translateX(1680px); } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .float-c { animation: float-c 7s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .sweep { animation: sweep 6s ease-in-out infinite; }
    .rotate-slow { animation: rotate-slow 80s linear infinite; transform-origin: center; transform-box: fill-box; }
  </style>

  <rect width="1280" height="520" fill="#0D1117"/>
  <rect width="1280" height="520" fill="url(#glowD)"/>

  <!-- Decorative geometric shapes -->
  <g opacity="0.9">
    <g class="rotate-slow" transform-origin="1080 140">
      <circle cx="1080" cy="140" r="80" fill="none" stroke="#F5F1E8" stroke-width="1.2" stroke-dasharray="3 8" opacity="0.2"/>
      <circle cx="1080" cy="60" r="3" fill="#FF6B35"/>
    </g>
    <circle class="float-a" cx="240" cy="80"  r="5" fill="#FF6B35" opacity="0.6"/>
    <circle class="float-b" cx="60"  cy="220" r="4" fill="#F5F1E8" opacity="0.35"/>
    <circle class="float-c" cx="1200" cy="380" r="6" fill="#FF6B35" opacity="0.45"/>
    <circle class="float-a" cx="780" cy="60"  r="3" fill="#F5F1E8" opacity="0.35"/>
    <circle class="float-b" cx="1140" cy="280" r="4" fill="#F5F1E8" opacity="0.3"/>
    <circle class="float-c" cx="60"  cy="460" r="7" fill="#F5F1E8" opacity="0.12"/>
    <rect class="float-b" x="918" y="56" width="10" height="10" fill="#FF6B35" opacity="0.6" transform="rotate(45 923 61)"/>
    <rect class="float-c" x="40" y="380" width="8" height="8" fill="#FF6B35" opacity="0.45" transform="rotate(45 44 384)"/>
  </g>

  <!-- Top meta row -->
  <text class="mono" x="80" y="68" font-size="16" font-weight="600" fill="#94A3B8" letter-spacing="2">BEIRUT, LEBANON  ·  DATA SCIENCE @ USAL  ·  GRADUATING JUNE 2026</text>
  <line x1="80" y1="86" x2="220" y2="86" stroke="#F5F1E8" stroke-width="1.4"/>

  <!-- Big name with sweep -->
  <g>
    <text class="sans" x="80" y="228" font-size="112" font-weight="800" fill="url(#nameD)" letter-spacing="-3.5">Yasser Hamdan</text>
    <g clip-path="inset(110px 0px 90px 0px)" opacity="0.55">
      <rect class="sweep" x="0" y="0" width="320" height="520" fill="url(#sweepD)"/>
    </g>
  </g>

  <!-- Animated accent rule -->
  <rect x="80" y="252" width="180" height="7" rx="3.5" fill="url(#accentD)" class="pulse-rule"/>

  <!-- Tagline -->
  <text class="sans" x="80" y="298" font-size="28" font-weight="600" fill="#F5F1E8">Python  ·  Odoo ERP  ·  AI Automation Engineer</text>

  <!-- Pull-quote claim -->
  <line x1="80" y1="332" x2="80" y2="404" stroke="url(#accentD)" stroke-width="5"/>
  <text class="sans" x="106" y="360" font-size="20" font-weight="600" fill="#F5F1E8">Shipped one production Odoo 18 module solo at Mobile Arts.</text>
  <text class="sans" x="106" y="390" font-size="20" font-weight="500" fill="#94A3B8">Ten Plotly dashboards at XpertBot. Six personal builds.</text>

  <!-- Status pill (live) -->
  <g transform="translate(80, 444)">
    <rect width="300" height="42" rx="21" fill="#FF6B35"/>
    <circle cx="26" cy="21" r="7" fill="#0D1117" class="live"/>
    <text class="sans" x="46" y="28" font-size="16" font-weight="700" fill="#0D1117" letter-spacing="1">OPEN TO WORK · JUNE 2026</text>
  </g>

  <!-- Right column: core stack -->
  <g class="mono" font-size="16" font-weight="600" fill="#F5F1E8">
    <text x="1200" y="68" text-anchor="end" letter-spacing="2" fill="#94A3B8" font-size="14">CORE STACK</text>
    <line x1="1100" y1="86" x2="1200" y2="86" stroke="#F5F1E8" stroke-width="1.4"/>

    <g transform="translate(1200, 130)" text-anchor="end">
      <text>Python</text>
      <text y="32">Odoo 18  /  QWeb</text>
      <text y="64">FastAPI</text>
      <text y="96">LangGraph</text>
      <text y="128">PyTorch</text>
      <text y="160">PostgreSQL  /  pgvector</text>
      <text y="192">React  /  TypeScript</text>
    </g>
  </g>

  <!-- Bottom edge rule -->
  <line x1="0" y1="518" x2="1280" y2="518" stroke="#F5F1E8" stroke-width="2"/>
</svg>
