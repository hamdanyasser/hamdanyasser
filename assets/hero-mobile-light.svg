<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentML" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E25E1E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="nameML" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1A2238"/>
      <stop offset="100%" stop-color="#0E7C8A"/>
    </linearGradient>
    <radialGradient id="bgGlowML" cx="50%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#FFF4E0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FAF7F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTealM" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0E7C8A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0E7C8A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink     { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes pulse-rule { 0%,100% { transform: scaleX(1); opacity: 0.9; } 50% { transform: scaleX(1.08); opacity: 1; } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .live   { animation: breathe 2.2s ease-in-out infinite; }
    .blink  { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .rotate-slow { animation: rotate-slow 60s linear infinite; transform-origin: 480px 180px; }
  </style>

  <rect width="600" height="680" fill="#FAF7F0"/>
  <rect width="600" height="680" fill="url(#bgGlowML)"/>
  <circle cx="100" cy="600" r="260" fill="url(#glowTealM)"/>

  <!-- Floating dots — spaced -->
  <circle class="float-a" cx="510" cy="500" r="6"  fill="#E25E1E" opacity="0.50"/>
  <circle class="float-b" cx="60"  cy="320" r="4"  fill="#0E7C8A" opacity="0.55"/>
  <circle class="float-a" cx="540" cy="630" r="5"  fill="#0E7C8A" opacity="0.30"/>
  <rect   class="float-b" x="40" y="540" width="9" height="9" fill="#E25E1E" opacity="0.40" transform="rotate(45 44 544)"/>

  <!-- Status pill -->
  <g transform="translate(40, 50)">
    <rect width="220" height="40" rx="20" fill="#E25E1E"/>
    <circle cx="22" cy="20" r="6" fill="#FAF7F0" class="live"/>
    <text class="sans" x="40" y="26" font-size="14" font-weight="800" fill="#FAF7F0" letter-spacing="1.4">AVAILABLE NOW</text>
  </g>

  <!-- Meta line -->
  <text class="mono" x="40" y="128" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="1.5">BEIRUT, LB  ·  USAL  ·  3 LANGUAGES</text>

  <!-- Y mark with orbit (top right) -->
  <g>
    <g class="rotate-slow">
      <circle cx="480" cy="180" r="80" fill="none" stroke="#1A2238" stroke-width="1" stroke-dasharray="3 7" opacity="0.22"/>
      <circle cx="480" cy="100" r="3" fill="#0E7C8A"/>
    </g>
    <circle cx="480" cy="180" r="56" fill="#1A2238"/>
    <circle cx="480" cy="180" r="56" fill="none" stroke="#E25E1E" stroke-width="3"/>
    <text class="sans" x="480" y="202" font-size="56" font-weight="800" fill="#FAF7F0" text-anchor="middle" letter-spacing="-2">Y</text>
  </g>

  <!-- Two-line name -->
  <text class="sans" x="40" y="338" font-size="86" font-weight="800" fill="url(#nameML)" letter-spacing="-3">Yasser</text>
  <g>
    <text class="sans" x="40" y="424" font-size="86" font-weight="800" fill="url(#nameML)" letter-spacing="-3">Hamdan.</text>
    <rect x="375" y="356" width="14" height="64" fill="#E25E1E" class="blink"/>
  </g>

  <!-- Accent rule -->
  <rect x="40" y="448" width="150" height="6" rx="3" fill="url(#accentML)" class="pulse-rule"/>

  <!-- Tagline (two lines, mixed) -->
  <text class="sans" x="40" y="500" font-size="22" font-weight="700" fill="#1A2238">Python  ·  Odoo ERP</text>
  <text class="sans" x="40" y="528" font-size="22" font-weight="500" fill="#0E7C8A" font-style="italic">AI Automation Engineer.</text>

  <!-- Bottom rule + tagline -->
  <line x1="40" y1="600" x2="560" y2="600" stroke="#1A2238" stroke-width="1.2"/>
  <text class="mono" x="300" y="638" font-size="12" font-weight="700" fill="#6B7280" letter-spacing="2" text-anchor="middle">SHIPPED 1 IN PROD  ·  6 PERSONAL BUILDS  ·  2 INTERNSHIPS</text>
</svg>
