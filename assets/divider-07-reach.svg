<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 120" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 07 — Contact">
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>
  <rect width="1280" height="120" fill="#EDE6D6"/>
  <line x1="48" y1="32" x2="1232" y2="32" stroke="#5C6A78" stroke-width="0.4"/>
  <g transform="translate(48, 70)">
    <text class="mono" font-size="22" font-weight="700" letter-spacing="3.6" fill="#0B1F33">PLATE  07  /  CONTACT</text>
    <text class="mono" y="24" font-size="12" font-weight="500" letter-spacing="2" fill="#5C6A78">for engagements  ⋅  please address  ⋅  any of the channels below</text>
  </g>
  <g transform="translate(1232, 70)" text-anchor="end">
    <text class="mono" font-size="13" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  7  /  7</text>
    <text class="mono" y="24" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78">accepting</text>
  </g>
  <circle cx="1188" cy="84" r="4" fill="#E25E1E" class="live"/>
  <line x1="48" y1="100" x2="1232" y2="100" stroke="#0B1F33" stroke-width="1"/>
</svg>
