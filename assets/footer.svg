<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 07 — Contact, drawing title block">
  <!--
    PLATE 07 / CONTACT
    The way a real engineering drawing is signed: a title block in the
    bottom-right with REVISED / DRAWN BY / STATUS, and three stamp
    boxes above it for LinkedIn, Email, GitHub.  The orange "available"
    dot fires once next to STATUS.
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <rect width="1280" height="480" fill="#EDE6D6"/>

  <rect x="20" y="20" width="1240" height="440" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <rect x="34" y="34" width="1212" height="412" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 460 L 28 460 M 20 452 L 20 468"/>
    <path d="M 1252 460 L 1268 460 M 1260 452 L 1260 468"/>
  </g>

  <!-- ============ TOP STRIP ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">FOR ENGAGEMENTS</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="36" font-size="13" font-weight="500" letter-spacing="0.5" fill="#5C6A78" font-style="italic">— please address the engineer at any of the channels below.</text>
  </g>
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  7  /  7</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">REVISED  ⋅  2026-06</text>
  </g>

  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- ============ THREE CONTACT STAMP BOXES ============ -->
  <!-- LINKEDIN -->
  <g>
    <rect x="48" y="178" width="384" height="96" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="48"  y1="170" x2="48"  y2="186"/>
      <line x1="432" y1="170" x2="432" y2="186"/>
      <line x1="48"  y1="266" x2="48"  y2="282"/>
      <line x1="432" y1="266" x2="432" y2="282"/>
    </g>
    <text class="mono" x="64"  y="202" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">CHANNEL  ⋅  A1</text>
    <text class="mono" x="64"  y="234" font-size="14" font-weight="700" letter-spacing="2" fill="#0B1F33">LINKEDIN</text>
    <line x1="64" y1="244" x2="124" y2="244" stroke="#0B1F33" stroke-width="1.2"/>
    <text class="mono" x="64"  y="262" font-size="13" font-weight="500" letter-spacing="0.5" fill="#0B1F33">linkedin.com/in/yasser-hamdan063</text>
  </g>

  <!-- EMAIL -->
  <g>
    <rect x="448" y="178" width="384" height="96" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="448" y1="170" x2="448" y2="186"/>
      <line x1="832" y1="170" x2="832" y2="186"/>
      <line x1="448" y1="266" x2="448" y2="282"/>
      <line x1="832" y1="266" x2="832" y2="282"/>
    </g>
    <text class="mono" x="464"  y="202" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">CHANNEL  ⋅  A2</text>
    <text class="mono" x="464"  y="234" font-size="14" font-weight="700" letter-spacing="2" fill="#0B1F33">EMAIL</text>
    <line x1="464" y1="244" x2="524" y2="244" stroke="#0B1F33" stroke-width="1.2"/>
    <text class="mono" x="464"  y="262" font-size="13" font-weight="500" letter-spacing="0.5" fill="#0B1F33">hamdanyasser2005@gmail.com</text>
  </g>

  <!-- GITHUB -->
  <g>
    <rect x="848" y="178" width="384" height="96" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="848"  y1="170" x2="848"  y2="186"/>
      <line x1="1232" y1="170" x2="1232" y2="186"/>
      <line x1="848"  y1="266" x2="848"  y2="282"/>
      <line x1="1232" y1="266" x2="1232" y2="282"/>
    </g>
    <text class="mono" x="864"  y="202" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">CHANNEL  ⋅  A3</text>
    <text class="mono" x="864"  y="234" font-size="14" font-weight="700" letter-spacing="2" fill="#0B1F33">GITHUB</text>
    <line x1="864" y1="244" x2="924" y2="244" stroke="#0B1F33" stroke-width="1.2"/>
    <text class="mono" x="864"  y="262" font-size="13" font-weight="500" letter-spacing="0.5" fill="#0B1F33">github.com/hamdanyasser</text>
  </g>

  <!-- ============ TITLE BLOCK (drawing-style sign-off) ============ -->
  <g transform="translate(48, 318)">
    <!-- 4-cell title block, full width -->
    <rect x="0" y="0" width="1184" height="78" fill="none" stroke="#0B1F33" stroke-width="1"/>
    <line x1="296" y1="0" x2="296" y2="78" stroke="#0B1F33" stroke-width="0.8"/>
    <line x1="592" y1="0" x2="592" y2="78" stroke="#0B1F33" stroke-width="0.8"/>
    <line x1="888" y1="0" x2="888" y2="78" stroke="#0B1F33" stroke-width="0.8"/>
    <line x1="0"   y1="32" x2="1184" y2="32" stroke="#0B1F33" stroke-width="0.4"/>

    <!-- cell 1: drawn by -->
    <text class="mono" x="14" y="22" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">DRAWN BY</text>
    <text class="mono" x="14" y="60" font-size="16" font-weight="700" letter-spacing="1.5" fill="#0B1F33">Y. HAMDAN</text>

    <!-- cell 2: drawn at -->
    <text class="mono" x="310" y="22" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">DRAWN AT</text>
    <text class="mono" x="310" y="60" font-size="16" font-weight="700" letter-spacing="1.5" fill="#0B1F33">BEIRUT, LB</text>

    <!-- cell 3: status (orange dot lives here) -->
    <text class="mono" x="606" y="22" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">STATUS</text>
    <text class="mono" x="606" y="60" font-size="16" font-weight="700" letter-spacing="1.5" fill="#0B1F33">open  /  accepting</text>
    <circle cx="848" cy="55" r="5.5" fill="#E25E1E" class="live"/>

    <!-- cell 4: available -->
    <text class="mono" x="902" y="22" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">AVAILABLE</text>
    <text class="mono" x="902" y="60" font-size="16" font-weight="700" letter-spacing="1.5" fill="#0B1F33">2026.06  →</text>
  </g>

  <!-- ============ MARGINAL NOTE ============ -->
  <g transform="translate(64, 422) rotate(-1.4)">
    <text class="mono" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">— if you read this far, the engineer is available from June 2026.</text>
  </g>

  <!-- bottom strip -->
  <text class="mono" x="1224" y="438" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33" text-anchor="end">CONTACT.001  /  PLATE 7  /  END OF SET</text>
</svg>
