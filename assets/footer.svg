<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Sign-off">
  <defs>
    <radialGradient id="bgFoot" cx="50%" cy="40%" r="85%">
      <stop offset="0%"   stop-color="#1F1810" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#13110D"/>
      <stop offset="80%"  stop-color="#0A0907"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <radialGradient id="footSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8B547" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#A0522D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9C6E1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footName" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FBE9C5"/>
      <stop offset="35%"  stop-color="#E8B547"/>
      <stop offset="55%"  stop-color="#FFD580"/>
      <stop offset="100%" stop-color="#9C6E1B"/>
    </linearGradient>
    <linearGradient id="footLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8B547" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#E8B547" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B547" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes pulseFast { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .star { animation: pulse 4s ease-in-out infinite; }
    .star-b { animation: pulse 3s ease-in-out infinite 0.7s; }
    .star-c { animation: pulse 5s ease-in-out infinite 1.5s; }
    .live { animation: pulseFast 1.6s ease-in-out infinite; }
  </style>

  <rect width="1280" height="320" fill="url(#bgFoot)"/>
  <circle cx="640" cy="160" r="280" fill="url(#footSun)"/>

  <g opacity="0.05" stroke="#A78BFA" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
  </g>

  <!-- Stars -->
  <circle class="star"   cx="180"  cy="50"  r="1.2" fill="#E8B547"/>
  <circle class="star-b" cx="1100" cy="60"  r="1.2" fill="#FFD580"/>
  <circle class="star-c" cx="220"  cy="270" r="1.2" fill="#FBE9C5"/>
  <circle class="star"   cx="1080" cy="260" r="1.2" fill="#E8B547"/>
  <circle class="star-b" cx="80"   cy="180" r="1"   fill="#DCC9A6"/>
  <circle class="star-c" cx="1200" cy="180" r="1"   fill="#FFD580"/>
  <circle class="star"   cx="400"  cy="40"  r="0.8" fill="#FBE9C5"/>
  <circle class="star-b" cx="880"  cy="40"  r="0.8" fill="#E8B547"/>

  <!-- Top label -->
  <text x="640" y="54" font-family="ui-monospace,monospace" font-size="14" fill="#CBD5E1" text-anchor="middle" letter-spacing="8" font-weight="600">FINAL  FRAME   ·   2026</text>
  <line x1="380" y1="74" x2="510" y2="74" stroke="#475569" stroke-width="0.5"/>
  <line x1="770" y1="74" x2="900" y2="74" stroke="#475569" stroke-width="0.5"/>

  <!-- Decorative top line -->
  <line x1="0" y1="100" x2="1280" y2="100" stroke="url(#footLine)" stroke-width="0.7"/>

  <!-- Big sign-off -->
  <text x="640" y="152" font-family="ui-monospace,monospace" font-size="42" font-weight="800" fill="url(#footName)" text-anchor="middle" letter-spacing="6" filter="url(#fg)">END  /  TRANSMISSION</text>
  <line x1="480" y1="176" x2="800" y2="176" stroke="url(#footLine)" stroke-width="0.7"/>

  <!-- Personal signature line -->
  <text x="640" y="208" font-family="ui-monospace,monospace" font-size="17" fill="#F1F5F9" text-anchor="middle" letter-spacing="3" font-weight="700">— if you read this far, let's talk —</text>

  <!-- Contact strip -->
  <g transform="translate(640, 244)" font-family="ui-monospace,monospace" font-size="14" text-anchor="middle">
    <text fill="#CBD5E1" letter-spacing="1.5" font-weight="600">github.com/hamdanyasser   ·   linkedin.com/in/yasser-hamdan063</text>
    <text y="22" fill="#94A3B8" letter-spacing="1.5">hamdanyasser2005@gmail.com</text>
  </g>

  <!-- Live status dot -->
  <g transform="translate(640, 296)">
    <circle cx="-160" r="4" fill="#22C55E" class="live"/>
    <circle cx="-160" r="9" fill="none" stroke="#22C55E" stroke-width="0.6" opacity="0.5" class="live"/>
    <text x="10" y="5" font-family="ui-monospace,monospace" font-size="13" fill="#86EFAC" text-anchor="middle" letter-spacing="3" font-weight="700">OPEN TO WORK  ·  STARTING JUNE 2026</text>
  </g>

  <!-- Cinematic frame brackets -->
  <g stroke="#475569" stroke-width="0.7" fill="none" opacity="0.7">
    <path d="M 24 24 L 24 60 L 60 60"/>
    <path d="M 1256 24 L 1256 60 L 1220 60"/>
    <path d="M 24 296 L 24 260 L 60 260"/>
    <path d="M 1256 296 L 1256 260 L 1220 260"/>
  </g>
</svg>
