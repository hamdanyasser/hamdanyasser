<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Sign-off">
  <defs>
    <radialGradient id="bgFoot" cx="50%" cy="40%" r="85%">
      <stop offset="0%"   stop-color="#3B1E78" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#1E1B4B"/>
      <stop offset="80%"  stop-color="#0E1640"/>
      <stop offset="100%" stop-color="#080A24"/>
    </radialGradient>
    <radialGradient id="footSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FBBF24" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#F472B6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footName" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="33%"  stop-color="#A78BFA"/>
      <stop offset="66%"  stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="footLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#F472B6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes pulseFast { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .star { animation: pulse 4s ease-in-out infinite; }
    .star-b { animation: pulse 3s ease-in-out infinite 0.7s; }
    .star-c { animation: pulse 5s ease-in-out infinite 1.5s; }
    .live { animation: pulseFast 1.6s ease-in-out infinite; }
  </style>

  <rect width="1280" height="320" fill="url(#bgFoot)"/>
  <circle cx="640" cy="160" r="280" fill="url(#footSun)"/>

  <g opacity="0.05" stroke="#A78BFA" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
  </g>

  <!-- Stars -->
  <circle class="star"   cx="180"  cy="50"  r="1.2" fill="#22D3EE"/>
  <circle class="star-b" cx="1100" cy="60"  r="1.2" fill="#A78BFA"/>
  <circle class="star-c" cx="220"  cy="270" r="1.2" fill="#F472B6"/>
  <circle class="star"   cx="1080" cy="260" r="1.2" fill="#FBBF24"/>
  <circle class="star-b" cx="80"   cy="180" r="1"   fill="#A78BFA"/>
  <circle class="star-c" cx="1200" cy="180" r="1"   fill="#22D3EE"/>
  <circle class="star"   cx="400"  cy="40"  r="0.8" fill="#F472B6"/>
  <circle class="star-b" cx="880"  cy="40"  r="0.8" fill="#22D3EE"/>

  <!-- Top label -->
  <text x="640" y="50" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="10">F I N A L   F R A M E   ·   2 0 2 6</text>
  <line x1="430" y1="68" x2="555" y2="68" stroke="#475569" stroke-width="0.5"/>
  <line x1="725" y1="68" x2="850" y2="68" stroke="#475569" stroke-width="0.5"/>

  <!-- Decorative top line -->
  <line x1="0" y1="100" x2="1280" y2="100" stroke="url(#footLine)" stroke-width="0.7"/>

  <!-- Big sign-off -->
  <text x="640" y="148" font-family="ui-monospace,monospace" font-size="34" font-weight="800" fill="url(#footName)" text-anchor="middle" letter-spacing="6" filter="url(#fg)">END  /  TRANSMISSION</text>
  <line x1="500" y1="170" x2="780" y2="170" stroke="url(#footLine)" stroke-width="0.7"/>

  <!-- Personal signature line -->
  <text x="640" y="200" font-family="ui-monospace,monospace" font-size="13" fill="#E2E8F0" text-anchor="middle" letter-spacing="3" font-weight="600">— if you read this far, let's talk —</text>

  <!-- Contact strip -->
  <g transform="translate(640, 232)" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle">
    <text fill="#94A3B8" letter-spacing="2">github.com/hamdanyasser   ·   linkedin.com/in/yasser-hamdan063   ·   hamdanyasser2005@gmail.com</text>
  </g>

  <!-- Live status dot -->
  <g transform="translate(640, 262)">
    <circle cx="-130" r="3.5" fill="#22C55E" class="live"/>
    <circle cx="-130" r="8" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.4" class="live"/>
    <text x="10" y="4" font-family="ui-monospace,monospace" font-size="10" fill="#86EFAC" text-anchor="middle" letter-spacing="3" font-weight="700">OPEN TO WORK  ·  STARTING JUNE 2026</text>
  </g>

  <!-- Bottom credit -->
  <text x="640" y="298" font-family="ui-monospace,monospace" font-size="9" fill="#475569" text-anchor="middle" letter-spacing="6">YASSER HAMDAN  ·  BUILT WITH CARE  ·  BEIRUT, LEBANON</text>

  <!-- Cinematic frame brackets -->
  <g stroke="#475569" stroke-width="0.7" fill="none" opacity="0.7">
    <path d="M 24 24 L 24 60 L 60 60"/>
    <path d="M 1256 24 L 1256 60 L 1220 60"/>
    <path d="M 24 296 L 24 260 L 60 260"/>
    <path d="M 1256 296 L 1256 260 L 1220 260"/>
  </g>
</svg>
