      <text x="64" y="295">Postgres + pgvector.  Three Pydantic-</text>
      <text x="64" y="312">validated tools.  Two-model routing.</text>
    </g>
    <!-- meta rows -->
    <g class="mono" font-size="11" fill="#0B1F33">
      <text x="64" y="346" font-weight="700" letter-spacing="2">STACK</text>
      <text x="118" y="346" font-weight="500">python ⋅ langgraph ⋅ fastapi ⋅ react</text>
      <text x="64" y="368" font-weight="700" letter-spacing="2">STATUS</text>
      <text x="118" y="368" font-weight="700">in service</text>
      <circle cx="200" cy="365" r="4" fill="#E25E1E" class="live"/>
    </g>
  </g>

