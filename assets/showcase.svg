    ===========================================================================
    GRID — 2 rows x 3 columns. Each module 384w x 224h.
    Row 1 y=170, Row 2 y=420.
    Col 1 x=48, Col 2 x=448, Col 3 x=848.
    16px gutter between cells.
    ===========================================================================
  -->

  <!-- ============ MOD.01 — ATLASBRIEF (featured) ============ -->
  <g>
    <rect x="48" y="170" width="384" height="224" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.8"/>
    <!-- corner ticks -->
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="48"  y1="162" x2="48"  y2="178"/>
      <line x1="432" y1="162" x2="432" y2="178"/>
      <line x1="48"  y1="386" x2="48"  y2="402"/>
      <line x1="432" y1="386" x2="432" y2="402"/>
    </g>
    <!-- header row -->
    <text class="mono" x="64"  y="194" font-size="12" font-weight="700" letter-spacing="2.5" fill="#0B1F33">MOD.01</text>
    <text class="mono" x="416" y="194" font-size="12" font-weight="700" letter-spacing="2.5" fill="#5C6A78" text-anchor="end">AGENT  ⋅  RAG</text>
