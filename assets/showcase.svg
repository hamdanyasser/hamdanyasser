<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 03 — Featured Work, system diagram">
  <!--
    PLATE 03 / FEATURED WORK
    Six modules drawn as labelled components on a 2x3 plate.
    Each cell carries a module ID (MOD.NN), a layer tag, a stack list,
    and a status line.  Module 01 (AtlasBrief) is annotated with an
    orange callout — "currently in service" — the only colour on the
    plate.  Connector hairline runs across the top edge of the grid,
    establishing that these are siblings on the same drawing.
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <rect width="1280" height="760" fill="#EDE6D6"/>

  <!-- plate borders -->
  <rect x="20" y="20" width="1240" height="720" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <rect x="34" y="34" width="1212" height="692" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <!-- crop marks -->
  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 740 L 28 740 M 20 732 L 20 748"/>
    <path d="M 1252 740 L 1268 740 M 1260 732 L 1260 748"/>
  </g>

  <!-- ============ TOP STRIP ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">FEATURED WORK  /  SYSTEM DIAGRAM</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="36" font-size="12" font-weight="500" letter-spacing="1.5" fill="#5C6A78">six modules  ⋅  shipped, in service, or under continued development</text>
  </g>
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">DRAWN  ⋅  2026-06</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SCALE  ⋅  1:1</text>
    <text class="mono" y="36" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  3  /  7</text>
  </g>

  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

