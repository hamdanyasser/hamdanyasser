<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Featured projects showcase">
  <defs>
    <linearGradient id="bgShow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B1024"/>
      <stop offset="100%" stop-color="#02030A"/>
    </linearGradient>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes flow { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
    .card { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
    .c1 { animation-delay: 0.1s; } .c2 { animation-delay: 0.2s; }
    .c3 { animation-delay: 0.3s; } .c4 { animation-delay: 0.4s; }
    .c5 { animation-delay: 0.5s; } .c6 { animation-delay: 0.6s; }
    .accent { animation: pulse 3s ease-in-out infinite; }
    .flowline { stroke-dasharray: 4 4; animation: flow 1.8s linear infinite; }
    .card rect.cardbg { transition: stroke-opacity 0.3s; }
    .card:hover rect.cardbg { stroke-opacity: 1; }
  </style>

  <rect width="1280" height="720" fill="url(#bgShow)"/>

  <!-- Header -->
  <text x="60" y="50" font-family="ui-monospace,monospace" font-size="10" fill="#475569" letter-spacing="6">FEATURED  /  6 PROJECTS</text>
  <line x1="60" y1="68" x2="280" y2="68" stroke="#1E293B" stroke-width="0.7"/>

  <!-- CARD 1: Odoo Auction (top-left) -->
  <g class="card c1" transform="translate(60, 100)">
    <rect class="cardbg" width="580" height="180" rx="12" fill="#0F172A" stroke="#A78BFA" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: stacked auction blocks -->
    <g transform="translate(30, 50)">
      <rect x="0" y="60" width="20" height="20" rx="2" fill="#A78BFA" opacity="0.4"/>
      <rect x="25" y="40" width="20" height="40" rx="2" fill="#A78BFA" opacity="0.6"/>
      <rect x="50" y="20" width="20" height="60" rx="2" fill="#A78BFA" opacity="0.8"/>
      <rect x="75" y="0" width="20" height="80" rx="2" fill="#A78BFA"/>
      <text x="85" y="-8" font-family="ui-monospace,monospace" font-size="9" fill="#A78BFA" text-anchor="middle">▲</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">01  ·  ERP</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">ODOO AUCTION MODULE</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">Bid validation, proxy bidding, anti-sniping, Buy Now,</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">payment tracking, security rules, QWeb templates,</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">analytics views. Sole developer at Mobile Arts.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#A78BFA" letter-spacing="2">ODOO 18  ·  PYTHON  ·  POSTGRESQL  ·  QWEB</text>
  </g>

  <!-- CARD 2: AtlasBrief (top-right) -->
  <g class="card c2" transform="translate(660, 100)">
    <rect class="cardbg" width="560" height="180" rx="12" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: route line with nodes -->
    <g transform="translate(30, 70)">
      <circle cx="10" cy="20" r="5" fill="#22D3EE"/>
      <path d="M 15 20 Q 35 0 55 20 T 95 20" stroke="#22D3EE" stroke-width="1.5" fill="none" class="flowline"/>
      <circle cx="55" cy="14" r="3" fill="#22D3EE" opacity="0.6"/>
      <circle cx="95" cy="20" r="5" fill="#22D3EE"/>
      <text x="55" y="50" font-family="ui-monospace,monospace" font-size="8" fill="#22D3EE" text-anchor="middle" letter-spacing="2">AGENT FLOW</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">02  ·  AGENTS</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">ATLASBRIEF</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">LangGraph travel-planning agent. RAG over Postgres +</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">pgvector, three Pydantic-validated tools, two-model</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">LLM routing with per-request cost logging.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#22D3EE" letter-spacing="2">PYTHON  ·  LANGGRAPH  ·  RAG  ·  FASTAPI  ·  REACT</text>
  </g>

  <!-- CARD 3: Atelier (mid-left) -->
  <g class="card c3" transform="translate(60, 300)">
    <rect class="cardbg" width="580" height="180" rx="12" fill="#0F172A" stroke="#10B981" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: trending price chart -->
    <g transform="translate(30, 60)">
      <polyline points="0,70 20,50 40,55 60,30 80,40 100,15" stroke="#10B981" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="70" r="2" fill="#10B981"/>
      <circle cx="20" cy="50" r="2" fill="#10B981"/>
      <circle cx="40" cy="55" r="2" fill="#10B981"/>
      <circle cx="60" cy="30" r="2" fill="#10B981"/>
      <circle cx="80" cy="40" r="2" fill="#10B981"/>
      <circle cx="100" cy="15" r="3" fill="#10B981" class="accent"/>
      <text x="50" y="95" font-family="ui-monospace,monospace" font-size="8" fill="#10B981" text-anchor="middle" letter-spacing="2">R² 0.90</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">03  ·  ML PIPELINE</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">ATELIER</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">Plain-English property descriptions → grounded prices.</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">LLM extracts features, Random Forest predicts (R² 0.90),</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">second LLM grounds predictions vs training stats.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#10B981" letter-spacing="2">PYTHON  ·  SCIKIT-LEARN  ·  OPENAI  ·  FASTAPI</text>
  </g>

  <!-- CARD 4: Support Triage (mid-right) -->
  <g class="card c4" transform="translate(660, 300)">
    <rect class="cardbg" width="560" height="180" rx="12" fill="#0F172A" stroke="#FB923C" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: A/B comparison gauge -->
    <g transform="translate(30, 70)">
      <path d="M 10 40 A 35 35 0 0 1 80 40" stroke="#FB923C" stroke-width="2" fill="none"/>
      <line x1="45" y1="40" x2="60" y2="15" stroke="#FB923C" stroke-width="2" class="accent"/>
      <circle cx="45" cy="40" r="3" fill="#FB923C"/>
      <text x="45" y="60" font-family="ui-monospace,monospace" font-size="8" fill="#FB923C" text-anchor="middle" letter-spacing="2">10K/HR</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">04  ·  RAG BENCHMARK</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">SUPPORT TRIAGE COCKPIT</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">RAG-grounded vs plain LLM replies. Local LogReg vs</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">zero-shot LLM. 20K tickets. Recommends what to ship</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">at 10K/hour by accuracy, latency, and cost.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#FB923C" letter-spacing="2">PYTHON  ·  CHROMA  ·  SCIKIT-LEARN  ·  FASTAPI</text>
  </g>

  <!-- CARD 5: DebugMaster (bottom-left) -->
  <g class="card c5" transform="translate(60, 500)">
    <rect class="cardbg" width="580" height="180" rx="12" fill="#0F172A" stroke="#F472B6" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: bug + fix arrow -->
    <g transform="translate(30, 60)">
      <text x="20" y="35" font-size="32" fill="#F472B6">🐛</text>
      <path d="M 55 30 L 85 30" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arrowPink)" class="flowline"/>
      <text x="80" y="35" font-size="22" fill="#F472B6">✓</text>
      <text x="50" y="65" font-family="ui-monospace,monospace" font-size="8" fill="#F472B6" text-anchor="middle" letter-spacing="2">DEBUG · BATTLE</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">05  ·  MOBILE</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">DEBUGMASTER</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">Java + Firebase Android app. Learning paths, AI mentor</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">support, XP/streaks, leaderboards, live multiplayer</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">debug battles. MVVM + Hilt + Room.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#F472B6" letter-spacing="2">JAVA  ·  ANDROID  ·  FIREBASE  ·  ROOM</text>
  </g>

  <!-- CARD 6: NER (bottom-right) -->
  <g class="card c6" transform="translate(660, 500)">
    <rect class="cardbg" width="560" height="180" rx="12" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Micro-illustration: highlighted text -->
    <g transform="translate(30, 60)">
      <rect x="0" y="20" width="100" height="14" rx="2" fill="#0F172A"/>
      <rect x="5" y="22" width="20" height="10" rx="1" fill="#38BDF8" opacity="0.7"/>
      <rect x="35" y="22" width="28" height="10" rx="1" fill="#38BDF8"/>
      <rect x="70" y="22" width="22" height="10" rx="1" fill="#38BDF8" opacity="0.5"/>
      <text x="50" y="55" font-family="ui-monospace,monospace" font-size="8" fill="#38BDF8" text-anchor="middle" letter-spacing="2">87% F1</text>
    </g>
    <!-- Content -->
    <text x="170" y="50" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="3">06  ·  DEEP LEARNING</text>
    <text x="170" y="78" font-family="ui-monospace,monospace" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="1">BIOMEDICAL NER</text>
    <text x="170" y="108" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">From-scratch NER on BC5CDR. BiLSTM-CRF + Viterbi,</text>
    <text x="170" y="124" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">char-CNN, attention, GloVe. Ablation studies isolating</text>
    <text x="170" y="140" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">each component. Live Gradio demo. 87% F1.</text>
    <text x="170" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#38BDF8" letter-spacing="2">PYTORCH  ·  NLP  ·  DEEP LEARNING  ·  GRADIO</text>
  </g>

  <defs>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F472B6"/>
    </marker>
  </defs>
</svg>
