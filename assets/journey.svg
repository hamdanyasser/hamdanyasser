<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Bill of Materials — career arc">
  <!--
    PLATE 1.A / BILL OF MATERIALS
    Career arc rendered as a parts list, the way a real technical
    drawing lists components at the bottom of the sheet.
    Hairline rules between rows; thicker rule above and below the body.
    Item 07 (open / available) carries the orange "operating" dot —
    the only animated element on the plate.
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <rect width="1280" height="600" fill="#EDE6D6"/>

  <!-- plate borders -->
  <rect x="20" y="20" width="1240" height="560" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <rect x="34" y="34" width="1212" height="532" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <!-- corner crop marks -->
  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 580 L 28 580 M 20 572 L 20 588"/>
    <path d="M 1252 580 L 1268 580 M 1260 572 L 1260 588"/>
  </g>

  <!-- ============ TOP STRIP ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">BILL OF MATERIALS</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="36" font-size="12" font-weight="500" letter-spacing="1.5" fill="#5C6A78">career arc as parts list  ⋅  in chronological order</text>
  </g>
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">REVISED  ⋅  2026-06</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SCALE  ⋅  1:1</text>
    <text class="mono" y="36" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  1.A  /  7</text>
  </g>

  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- ============ COLUMN HEADERS ============ -->
  <g class="mono" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78">
    <text x="56" y="174">ITEM</text>
    <text x="156" y="174">DATE</text>
    <text x="400" y="174">LOCATION</text>
    <text x="720" y="174">ROLE</text>
    <text x="950" y="174">DELIVERABLE</text>
  </g>
  <line x1="48" y1="186" x2="1232" y2="186" stroke="#0B1F33" stroke-width="0.7"/>

  <!-- ============ ROWS ============ -->
  <!-- 01 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="220" font-weight="700" letter-spacing="2">01</text>
    <text x="156" y="220" font-weight="500">2023.09 — pres.</text>
    <text x="400" y="220" font-weight="500">USAL  ⋅  Beirut, LB</text>
    <text x="720" y="220" font-weight="500">undergraduate</text>
    <text x="950" y="220" font-weight="500">BSc Data Science  (in progress)</text>
  </g>
  <line x1="48" y1="234" x2="1232" y2="234" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 02 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="266" font-weight="700" letter-spacing="2">02</text>
    <text x="156" y="266" font-weight="500">2024</text>
    <text x="400" y="266" font-weight="500">self-directed</text>
    <text x="720" y="266" font-weight="500">builder</text>
    <text x="950" y="266" font-weight="500">DebugMaster  ⋅  Android / Firebase</text>
  </g>
  <line x1="48" y1="280" x2="1232" y2="280" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 03 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="312" font-weight="700" letter-spacing="2">03</text>
    <text x="156" y="312" font-weight="500">2024</text>
    <text x="400" y="312" font-weight="500">self-directed  ⋅  research</text>
    <text x="720" y="312" font-weight="500">builder</text>
    <text x="950" y="312" font-weight="500">Biomedical NER  ⋅  BiLSTM-CRF  (87% F1)</text>
  </g>
  <line x1="48" y1="326" x2="1232" y2="326" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 04 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="358" font-weight="700" letter-spacing="2">04</text>
    <text x="156" y="358" font-weight="500">2025</text>
    <text x="400" y="358" font-weight="500">XpertBot Academy  ⋅  Beirut</text>
    <text x="720" y="358" font-weight="500">ML intern</text>
    <text x="950" y="358" font-weight="500">10+ Plotly dashboards  ⋅  renewable energy</text>
  </g>
  <line x1="48" y1="372" x2="1232" y2="372" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 05 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="404" font-weight="700" letter-spacing="2">05</text>
    <text x="156" y="404" font-weight="500">2025</text>
    <text x="400" y="404" font-weight="500">Mobile Arts  ⋅  Beirut</text>
    <text x="720" y="404" font-weight="500">Odoo dev  (sole)</text>
    <text x="950" y="404" font-weight="500">Odoo 18 Auction Module  ⋅  production</text>
  </g>
  <line x1="48" y1="418" x2="1232" y2="418" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 06 -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="450" font-weight="700" letter-spacing="2">06</text>
    <text x="156" y="450" font-weight="500">2025 — pres.</text>
    <text x="400" y="450" font-weight="500">self-directed</text>
    <text x="720" y="450" font-weight="500">builder</text>
    <text x="950" y="450" font-weight="500">AtlasBrief  ⋅  Atelier  ⋅  Triage Cockpit</text>
  </g>
  <line x1="48" y1="464" x2="1232" y2="464" stroke="#5C6A78" stroke-width="0.3" opacity="0.6"/>

  <!-- 07 (open / current) — orange dot -->
  <g class="mono" font-size="13" fill="#0B1F33">
    <text x="56"  y="496" font-weight="700" letter-spacing="2">07</text>
    <text x="156" y="496" font-weight="700">2026.06  →</text>
    <text x="400" y="496" font-weight="700">—</text>
    <text x="720" y="496" font-weight="700">open  /  available</text>
    <text x="950" y="496" font-weight="700">next assignment</text>
    <circle cx="1180" cy="492" r="5" fill="#E25E1E" class="live"/>
  </g>
  <line x1="48" y1="510" x2="1232" y2="510" stroke="#0B1F33" stroke-width="0.7"/>

  <!-- ============ BOTTOM STRIP ============ -->
  <line x1="48" y1="538" x2="1232" y2="538" stroke="#0B1F33" stroke-width="0.5"/>
  <text class="mono" x="56"  y="562" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33">Y-H  ⋅  BRT  ⋅  2026</text>
  <text class="mono" x="640" y="562" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">7  ITEMS  ⋅  CHRONOLOGICAL  ⋅  CONFIDENCE: HIGH</text>
  <text class="mono" x="1224" y="562" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33" text-anchor="end">BOM.001  /  PLATE 1.A</text>
</svg>
