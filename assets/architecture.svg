<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 04 — Subsystem Detail: AtlasBrief request flow">
  <!--
    PLATE 04 / SUBSYSTEM DETAIL
    AtlasBrief request flow rendered as a schematic.
    Hairline boxes, leader lines, stage labels above each component.
    Orange "in service" callout fires once on the live deployment.
    Two callouts at bottom: ~60% tokens saved (cobalt-style fact)
    and 100% traceable (graphite mention).
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B1F33"/>
    </marker>
    <marker id="arrowGph" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6A78"/>
    </marker>
    <marker id="arrowOr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E25E1E"/>
    </marker>
  </defs>

  <rect width="1280" height="700" fill="#EDE6D6"/>

  <!-- plate borders -->
  <rect x="20" y="20" width="1240" height="660" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <rect x="34" y="34" width="1212" height="632" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 680 L 28 680 M 20 672 L 20 688"/>
    <path d="M 1252 680 L 1268 680 M 1260 672 L 1260 688"/>
  </g>

  <!-- ============ TOP STRIP ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">ATLASBRIEF  /  REQUEST FLOW</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="36" font-size="12" font-weight="500" letter-spacing="1.5" fill="#5C6A78">how a vague trip idea becomes a defended itinerary  ⋅  cutaway view</text>
  </g>
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">DRAWN  ⋅  2026-06</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SCALE  ⋅  1:1</text>
    <text class="mono" y="36" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  4  /  7</text>
  </g>

  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- ============ DIAGRAM ============ -->

  <!-- USER QUERY (input) -->
  <g>
    <rect x="56" y="270" width="180" height="120" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.8"/>
    <text class="mono" x="146" y="298" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78" text-anchor="middle">INPUT</text>
    <line x1="80" y1="308" x2="212" y2="308" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="146" y="332" font-size="14" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">USER QUERY</text>
    <text class="mono" x="146" y="358" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">"weekend in budget</text>
    <text class="mono" x="146" y="374" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">paris, foodie"</text>
  </g>

  <line x1="236" y1="330" x2="296" y2="330" stroke="#0B1F33" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- EXTRACTOR (stage 1) -->
  <g>
    <rect x="296" y="270" width="180" height="120" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.8"/>
    <text class="mono" x="386" y="298" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78" text-anchor="middle">STAGE 1  /  EXTRACT</text>
    <line x1="320" y1="308" x2="452" y2="308" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="386" y="332" font-size="14" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">EXTRACTOR LLM</text>
    <text class="mono" x="386" y="358" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">cheap  ⋅  fast  ⋅  structured</text>
    <text class="mono" x="386" y="374" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">→  Pydantic JSON</text>
  </g>

  <line x1="476" y1="330" x2="536" y2="330" stroke="#0B1F33" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- AGENT (stage 2 — orchestrator, centerpiece) -->
  <g>
    <rect x="536" y="240" width="200" height="180" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1.4"/>
    <!-- corner ticks -->
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="536" y1="232" x2="536" y2="248"/>
      <line x1="736" y1="232" x2="736" y2="248"/>
      <line x1="536" y1="412" x2="536" y2="428"/>
      <line x1="736" y1="412" x2="736" y2="428"/>
    </g>
    <text class="mono" x="636" y="268" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78" text-anchor="middle">STAGE 2  /  ORCHESTRATE</text>
    <line x1="560" y1="278" x2="712" y2="278" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="636" y="306" font-size="16" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">LANGGRAPH</text>
    <text class="mono" x="636" y="324" font-size="16" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">AGENT</text>
    <line x1="600" y1="334" x2="672" y2="334" stroke="#0B1F33" stroke-width="1.2"/>
    <text class="mono" x="636" y="358" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">picks tools, drives state</text>
    <text class="mono" x="636" y="374" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">handles retries, logs cost</text>
    <text class="mono" x="636" y="398" font-size="11" font-weight="700" letter-spacing="2" fill="#5C6A78" text-anchor="middle">⬤  STATEFUL</text>
  </g>

  <!-- branches to 3 tools -->
  <line x1="736" y1="290" x2="800" y2="230" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>
  <line x1="736" y1="330" x2="800" y2="330" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>
  <line x1="736" y1="370" x2="800" y2="430" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>

  <!-- TOOL.A — RAG RETRIEVER -->
  <g>
    <rect x="800" y="200" width="200" height="80" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" x="900" y="220" font-size="10" font-weight="700" letter-spacing="2" fill="#5C6A78" text-anchor="middle">TOOL.A</text>
    <text class="mono" x="900" y="244" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">RAG RETRIEVER</text>
    <text class="mono" x="900" y="262" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">postgres + pgvector</text>
    <text class="mono" x="900" y="276" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">city  ⋅  area  ⋅  venue</text>
  </g>

  <!-- TOOL.B — STYLE CLASSIFIER -->
  <g>
    <rect x="800" y="290" width="200" height="80" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" x="900" y="310" font-size="10" font-weight="700" letter-spacing="2" fill="#5C6A78" text-anchor="middle">TOOL.B</text>
    <text class="mono" x="900" y="334" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">STYLE CLASSIFIER</text>
    <text class="mono" x="900" y="352" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">scikit-learn pipeline</text>
    <text class="mono" x="900" y="366" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">GridSearchCV-tuned</text>
  </g>

  <!-- TOOL.C — LIVE CONDITIONS -->
  <g>
    <rect x="800" y="380" width="200" height="80" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" x="900" y="400" font-size="10" font-weight="700" letter-spacing="2" fill="#5C6A78" text-anchor="middle">TOOL.C</text>
    <text class="mono" x="900" y="424" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">LIVE CONDITIONS</text>
    <text class="mono" x="900" y="442" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">weather  ⋅  pricing  ⋅  seats</text>
    <text class="mono" x="900" y="456" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">async + retry / backoff</text>
  </g>

  <!-- merge lines back to SYNTHESIZER -->
  <line x1="1000" y1="230" x2="1060" y2="290" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>
  <line x1="1000" y1="330" x2="1060" y2="330" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>
  <line x1="1000" y1="430" x2="1060" y2="370" stroke="#5C6A78" stroke-width="0.8" marker-end="url(#arrowGph)"/>

  <!-- SYNTHESIZER (stage 3) -->
  <g>
    <rect x="1060" y="270" width="172" height="120" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.8"/>
    <text class="mono" x="1146" y="298" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78" text-anchor="middle">STAGE 3  /  WRITE</text>
    <line x1="1080" y1="308" x2="1212" y2="308" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="1146" y="332" font-size="14" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">SYNTHESIZER</text>
    <text class="mono" x="1146" y="358" font-size="11" font-weight="500" fill="#0B1F33" text-anchor="middle">strong model</text>
    <text class="mono" x="1146" y="374" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">slow ok  ⋅  reasons well</text>
  </g>

  <!-- terminator: DECISION TENSION (output) -->
  <line x1="1146" y1="392" x2="1146" y2="436" stroke="#0B1F33" stroke-width="0.8" marker-end="url(#arrow)"/>
  <g>
    <rect x="1058" y="438" width="176" height="60" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1.4"/>
    <text class="mono" x="1146" y="464" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0B1F33" text-anchor="middle">DECISION TENSION</text>
    <text class="mono" x="1146" y="482" font-size="11" font-weight="500" fill="#5C6A78" text-anchor="middle">→ rendered to React UI</text>
  </g>

  <!-- ============ ORANGE CALLOUT — currently in service ============ -->
  <g>
    <text class="mono" x="636" y="468" font-size="11" font-weight="700" letter-spacing="2" fill="#E25E1E" text-anchor="middle" font-style="italic">⬤  currently in service</text>
    <line x1="636" y1="478" x2="636" y2="510" stroke="#E25E1E" stroke-width="1.2"/>
    <line x1="636" y1="510" x2="496" y2="510" stroke="#E25E1E" stroke-width="1.2"/>
    <line x1="496" y1="510" x2="496" y2="420" stroke="#E25E1E" stroke-width="1.2" marker-end="url(#arrowOr)"/>
    <circle cx="636" cy="468" r="3" fill="#E25E1E" class="live"/>
  </g>

  <!-- ============ MARGINAL NOTE ============ -->
  <g transform="translate(70, 568) rotate(-1.4)">
    <text class="mono" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">— two-model routing saves ~60% tokens per request without measurable</text>
    <text class="mono" y="17" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">  quality loss on extraction.  per-request cost logged at every node.</text>
  </g>

  <!-- ============ FOOTNOTES ============ -->
  <line x1="48" y1="608" x2="1232" y2="608" stroke="#0B1F33" stroke-width="0.5"/>
  <text class="mono" x="56"   y="630" font-size="12" font-weight="700" letter-spacing="2" fill="#0B1F33">▸  ~60% TOKENS SAVED  /  TWO-MODEL ROUTING</text>
  <text class="mono" x="56"   y="648" font-size="11" font-weight="500" letter-spacing="1" fill="#5C6A78">Pydantic at every boundary  ⋅  per-request cost logged  ⋅  agent decisions traceable end-to-end</text>
  <text class="mono" x="1224" y="630" font-size="12" font-weight="700" letter-spacing="2" fill="#0B1F33" text-anchor="end">▸  100% TRACEABLE</text>
  <text class="mono" x="1224" y="648" font-size="11" font-weight="500" letter-spacing="1" fill="#5C6A78" text-anchor="end">every tool call  ⋅  every retry  ⋅  every dollar</text>

  <line x1="48" y1="660" x2="1232" y2="660" stroke="#0B1F33" stroke-width="0.5"/>
  <text class="mono" x="56"   y="676" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33">Y-H  ⋅  BRT  ⋅  2026</text>
  <text class="mono" x="1224" y="676" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33" text-anchor="end">FLOW.001  /  SHEET 4</text>
</svg>
