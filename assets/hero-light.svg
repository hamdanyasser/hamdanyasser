<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" width="1280" height="540" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E25E1E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="nameL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1A2238"/>
      <stop offset="55%"  stop-color="#1F3654"/>
      <stop offset="100%" stop-color="#0E7C8A"/>
    </linearGradient>
    <radialGradient id="glowL" cx="35%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#FFF4E0" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#FAF7F0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FAF7F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="80%" cy="75%" r="35%">
      <stop offset="0%"   stop-color="#0E7C8A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0E7C8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E25E1E" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#F59E0B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E25E1E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink    { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes float-c  { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6px,-4px); } }
    @keyframes pulse-rule { 0%,100% { opacity: 0.85; transform: scaleX(1); } 50% { opacity: 1; transform: scaleX(1.08); } }
    @keyframes sweep    { 0% { transform: translateX(-400px); } 100% { transform: translateX(1680px); } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-rev  { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    .live  { animation: breathe 2.2s ease-in-out infinite; }
    .blink { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .float-c { animation: float-c 7s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .sweep { animation: sweep 6s ease-in-out infinite; }
    .rotate-slow { animation: rotate-slow 80s linear infinite; transform-origin: 1080px 140px; }
    .rotate-rev  { animation: rotate-rev 50s linear infinite; transform-origin: 158px 318px; }
  </style>

  <rect width="1280" height="540" fill="#FAF7F0"/>
  <rect width="1280" height="540" fill="url(#glowL)"/>
  <rect width="1280" height="540" fill="url(#tealGlow)"/>

  <!-- Big decorative ring upper right -->
  <g class="rotate-slow">
    <circle cx="1080" cy="140" r="80" fill="none" stroke="#1A2238" stroke-width="1.2" stroke-dasharray="3 8" opacity="0.18"/>
    <circle cx="1080" cy="60" r="4" fill="#E25E1E"/>
  </g>

  <!-- Floating decorative dots -->
  <g>
    <circle class="float-a" cx="240" cy="80"  r="5" fill="#E25E1E" opacity="0.55"/>
    <circle class="float-b" cx="60"  cy="200" r="4" fill="#0E7C8A" opacity="0.55"/>
    <circle class="float-c" cx="1200" cy="380" r="6" fill="#E25E1E" opacity="0.5"/>
    <circle class="float-a" cx="780" cy="60"  r="3" fill="#1A2238" opacity="0.35"/>
    <circle class="float-b" cx="1140" cy="280" r="4" fill="#0E7C8A" opacity="0.45"/>
    <circle class="float-c" cx="60"  cy="480" r="7" fill="#1A2238" opacity="0.15"/>
    <rect class="float-b" x="918" y="56" width="10" height="10" fill="#E25E1E" opacity="0.55" transform="rotate(45 923 61)"/>
    <rect class="float-c" x="40" y="400" width="8" height="8" fill="#0E7C8A" opacity="0.5" transform="rotate(45 44 404)"/>
  </g>

  <!-- Status pill (TOP) -->
  <g transform="translate(80, 50)">
    <rect width="320" height="42" rx="21" fill="#E25E1E"/>
    <circle cx="26" cy="21" r="7" fill="#FAF7F0" class="live"/>
    <text class="sans" x="48" y="28" font-size="16" font-weight="800" fill="#FAF7F0" letter-spacing="1.5">OPEN TO WORK · AVAILABLE NOW</text>
  </g>

  <!-- Meta strip right -->
  <text class="mono" x="1200" y="76" text-anchor="end" font-size="14" font-weight="600" fill="#6B7280" letter-spacing="2">BEIRUT, LB · USAL '26 · 3 LANGUAGES</text>

  <!-- Y monogram with reverse-rotating dashed ring -->
  <g>
    <g class="rotate-rev">
      <circle cx="158" cy="318" r="76" fill="none" stroke="#1A2238" stroke-width="1" stroke-dasharray="2 6" opacity="0.3"/>
      <circle cx="158" cy="242" r="3" fill="#0E7C8A"/>
    </g>
    <circle cx="158" cy="318" r="56" fill="#1A2238"/>
    <circle cx="158" cy="318" r="56" fill="none" stroke="#E25E1E" stroke-width="3.5"/>
    <text class="sans" x="158" y="340" font-size="56" font-weight="800" fill="#FAF7F0" text-anchor="middle" letter-spacing="-2">Y</text>
  </g>

  <!-- Big name + cursor -->
  <g>
    <text class="sans" x="250" y="252" font-size="116" font-weight="800" fill="url(#nameL)" letter-spacing="-3.5">Yasser Hamdan</text>
    <g clip-path="inset(150px 0px 230px 0px)" opacity="0.55">
      <rect class="sweep" x="0" y="0" width="320" height="540" fill="url(#sweepL)"/>
    </g>
    <rect x="1098" y="178" width="16" height="80" fill="#E25E1E" class="blink"/>
  </g>

  <!-- Animated accent rule -->
  <rect x="250" y="276" width="200" height="7" rx="3.5" fill="url(#accentL)" class="pulse-rule"/>

  <!-- Tagline — mixed weight + italic teal -->
  <text class="sans" x="250" y="322" font-size="28" font-weight="700" fill="#1A2238">Python  ·  Odoo ERP  ·</text>
  <text class="sans" x="556" y="322" font-size="28" font-weight="500" fill="#0E7C8A" font-style="italic">AI Automation Engineer.</text>

  <!-- Pull-quote -->
  <g transform="translate(250, 356)">
    <line x1="0" y1="0" x2="0" y2="100" stroke="url(#accentL)" stroke-width="5"/>
    <text class="sans" x="26" y="32" font-size="20" font-weight="700" fill="#1A2238">Shipped one production Odoo 18 module solo at Mobile Arts.</text>
    <text class="sans" x="26" y="64" font-size="20" font-weight="500" fill="#6B7280">Ten Plotly dashboards at XpertBot. Six personal builds.</text>
    <text class="mono" x="26" y="92" font-size="13" font-weight="600" fill="#0E7C8A" letter-spacing="1.5">▸ AVAILABLE FOR HIRE  ⋅  ERP / PYTHON / AI / ML</text>
  </g>

  <!-- Right column: core stack -->
  <g class="mono" font-size="16" font-weight="600" fill="#1A2238">
    <text x="1200" y="148" text-anchor="end" letter-spacing="2.5" fill="#6B7280" font-size="13">CORE STACK</text>
    <line x1="1100" y1="166" x2="1200" y2="166" stroke="#1A2238" stroke-width="1.4"/>

    <g transform="translate(1200, 200)" text-anchor="end">
      <text>Python</text>
      <text y="30">Odoo 18  /  QWeb</text>
      <text y="60">FastAPI</text>
      <text y="90">LangGraph</text>
      <text y="120">PyTorch</text>
      <text y="150">PostgreSQL  /  pgvector</text>
      <text y="180">React  /  TypeScript</text>
    </g>
  </g>

  <!-- Bottom edge rule -->
  <line x1="0" y1="538" x2="1280" y2="538" stroke="#1A2238" stroke-width="2"/>
</svg>
