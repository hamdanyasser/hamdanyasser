<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" width="1280" height="500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E25E1E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="nameL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1A2238"/>
      <stop offset="100%" stop-color="#0E7C8A"/>
    </linearGradient>
    <radialGradient id="glowL" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFF4E0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FAF7F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlowL" cx="85%" cy="75%" r="35%">
      <stop offset="0%"   stop-color="#0E7C8A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0E7C8A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink     { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes pulse-rule { 0%,100% { transform: scaleX(1); opacity: 0.9; } 50% { transform: scaleX(1.08); opacity: 1; } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-rev  { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    .live   { animation: breathe 2.2s ease-in-out infinite; }
    .blink  { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .rotate-slow { animation: rotate-slow 80s linear infinite; transform-origin: 1100px 250px; }
    .rotate-rev  { animation: rotate-rev 50s linear infinite; transform-origin: 1100px 250px; }
  </style>

  <rect width="1280" height="500" fill="#FAF7F0"/>
  <rect width="1280" height="500" fill="url(#glowL)"/>
  <rect width="1280" height="500" fill="url(#tealGlowL)"/>

  <!-- Floating decorative dots — distributed, not crowded -->
  <circle class="float-a" cx="220"  cy="80"  r="5" fill="#E25E1E" opacity="0.55"/>
  <circle class="float-b" cx="60"   cy="240" r="4" fill="#0E7C8A" opacity="0.55"/>
  <circle class="float-a" cx="720"  cy="60"  r="3" fill="#1A2238" opacity="0.30"/>
  <circle class="float-b" cx="40"   cy="430" r="6" fill="#1A2238" opacity="0.15"/>
  <rect   class="float-b" x="820"  y="56" width="9" height="9" fill="#E25E1E" opacity="0.50" transform="rotate(45 824 60)"/>

  <!-- Meta strip top -->
  <text class="mono" x="80" y="70" font-size="14" font-weight="600" fill="#6B7280" letter-spacing="2.2">BEIRUT, LB  ·  DATA SCIENCE @ USAL  ·  3 LANGUAGES</text>
  <line x1="80" y1="86" x2="220" y2="86" stroke="#1A2238" stroke-width="1.4"/>

  <!-- Status pill (sized for content, no overflow) -->
  <g transform="translate(80, 110)">
    <rect width="240" height="42" rx="21" fill="#E25E1E"/>
    <circle cx="24" cy="21" r="7" fill="#FAF7F0" class="live"/>
    <text class="sans" x="44" y="28" font-size="16" font-weight="800" fill="#FAF7F0" letter-spacing="1.5">AVAILABLE NOW</text>
  </g>

  <!-- Name — two lines, big, no overflow -->
  <text class="sans" x="80" y="282" font-size="104" font-weight="800" fill="url(#nameL)" letter-spacing="-3.5">Yasser</text>
  <g>
    <text class="sans" x="80" y="384" font-size="104" font-weight="800" fill="url(#nameL)" letter-spacing="-3.5">Hamdan.</text>
    <rect x="555" y="316" width="14" height="76" fill="#E25E1E" class="blink"/>
  </g>

  <!-- Accent rule -->
  <rect x="80" y="408" width="180" height="7" rx="3.5" fill="url(#accentL)" class="pulse-rule"/>

  <!-- Tagline — mixed weight + italic teal -->
  <text class="sans" x="80" y="456" font-size="26" font-weight="700" fill="#1A2238">Python  ·  Odoo ERP  ·</text>
  <text class="sans" x="436" y="456" font-size="26" font-weight="500" fill="#0E7C8A" font-style="italic">AI Automation Engineer.</text>

  <!-- Y monogram with dual orbits (right side, lots of breathing room) -->
  <g>
    <g class="rotate-slow">
      <circle cx="1100" cy="250" r="130" fill="none" stroke="#1A2238" stroke-width="1" stroke-dasharray="3 8" opacity="0.18"/>
      <circle cx="1100" cy="120" r="4" fill="#E25E1E"/>
    </g>
    <g class="rotate-rev">
      <circle cx="1100" cy="250" r="100" fill="none" stroke="#0E7C8A" stroke-width="1" stroke-dasharray="2 6" opacity="0.32"/>
      <circle cx="1100" cy="150" r="3" fill="#0E7C8A"/>
    </g>
    <circle cx="1100" cy="250" r="72" fill="#1A2238"/>
    <circle cx="1100" cy="250" r="72" fill="none" stroke="#E25E1E" stroke-width="4"/>
    <text class="sans" x="1100" y="280" font-size="76" font-weight="800" fill="#FAF7F0" text-anchor="middle" letter-spacing="-3">Y</text>
  </g>

  <!-- Bottom rule -->
  <line x1="0" y1="498" x2="1280" y2="498" stroke="#1A2238" stroke-width="2"/>
</svg>
