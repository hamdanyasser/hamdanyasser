<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Module 03 — Triage Cockpit">
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  </style>
  <rect width="600" height="340" fill="#EDE6D6"/>
  <rect x="14" y="14" width="572" height="312" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <g stroke="#0B1F33" stroke-width="0.7">
    <line x1="14" y1="6"   x2="14" y2="22"/>
    <line x1="586" y1="6"  x2="586" y2="22"/>
    <line x1="14" y1="318" x2="14" y2="334"/>
    <line x1="586" y1="318" x2="586" y2="334"/>
  </g>
  <text class="mono" x="32"  y="50" font-size="14" font-weight="700" letter-spacing="3" fill="#0B1F33">MOD.03</text>
  <text class="mono" x="568" y="50" font-size="14" font-weight="700" letter-spacing="3" fill="#5C6A78" text-anchor="end">RAG  ⋅  BENCHMARK</text>
  <line x1="32" y1="62" x2="568" y2="62" stroke="#5C6A78" stroke-width="0.4"/>
  <text class="mono" x="32" y="106" font-size="30" font-weight="700" letter-spacing="0.5" fill="#0B1F33">TRIAGE COCKPIT</text>
  <line x1="32" y1="118" x2="120" y2="118" stroke="#0B1F33" stroke-width="1.4"/>
  <g class="mono" font-size="14" font-weight="500" fill="#0B1F33">
    <text x="32" y="158">RAG-grounded vs.  plain LLM.  Local logistic</text>
