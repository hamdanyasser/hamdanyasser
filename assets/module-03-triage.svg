  <line x1="32" y1="290" x2="568" y2="290" stroke="#5C6A78" stroke-width="0.4"/>
  <text class="mono" x="32"  y="310" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78">↗  github.com / hamdanyasser / support-triage-cockpit</text>
