<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — cinematic profile hero">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#0B1024"/>
      <stop offset="100%" stop-color="#02030A"/>
    </radialGradient>
    <linearGradient id="name" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="35%" stop-color="#A78BFA"/>
      <stop offset="70%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes pulseFast { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes sweepX { 0% { transform: translateX(-1280px); } 100% { transform: translateX(1280px); } }
    @keyframes auraExpand { 0%,100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.7; } }

    .name { animation: rise 1.6s cubic-bezier(.16,.84,.3,1) forwards; opacity: 0; }
    .underline { animation: fadeIn 1.2s ease-out 0.6s forwards; opacity: 0; transform-origin: center; }
    .tag { animation: rise 1.4s cubic-bezier(.16,.84,.3,1) 0.7s forwards; opacity: 0; }
    .meta { animation: fadeIn 1.6s ease-out 1.1s forwards; opacity: 0; }
    .status { animation: rise 1.4s cubic-bezier(.16,.84,.3,1) 1.4s forwards; opacity: 0; }

    .star-a { animation: pulse 4s ease-in-out infinite; }
    .star-b { animation: pulse 3s ease-in-out infinite 0.7s; }
    .star-c { animation: pulse 5s ease-in-out infinite 1.4s; }
    .star-d { animation: pulseFast 2.5s ease-in-out infinite 0.3s; }

    .orbit-1 { transform-origin: 640px 220px; animation: spin 80s linear infinite; }
    .orbit-2 { transform-origin: 640px 220px; animation: spinReverse 110s linear infinite; }
    .orbit-3 { transform-origin: 640px 220px; animation: spin 140s linear infinite; }

    .chip { animation: drift 5s ease-in-out infinite; }
    .chip-b { animation: drift 5.5s ease-in-out infinite 1.2s; }
    .chip-c { animation: drift 4.8s ease-in-out infinite 2.4s; }
    .chip-d { animation: drift 5.2s ease-in-out infinite 0.8s; }
    .chip-e { animation: drift 5s ease-in-out infinite 3s; }
    .chip-f { animation: drift 4.6s ease-in-out infinite 1.8s; }

    .sweep { animation: sweepX 7s ease-in-out infinite; }
    .aura { transform-origin: 640px 220px; animation: auraExpand 4s ease-in-out infinite; }
    .live { animation: pulseFast 1.6s ease-in-out infinite; }
  </style>

  <rect width="1280" height="440" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#A78BFA" stroke-width="0.5">
    <line x1="0" y1="110" x2="1280" y2="110"/>
    <line x1="0" y1="220" x2="1280" y2="220"/>
    <line x1="0" y1="330" x2="1280" y2="330"/>
    <line x1="320" y1="0" x2="320" y2="440"/>
    <line x1="640" y1="0" x2="640" y2="440"/>
    <line x1="960" y1="0" x2="960" y2="440"/>
  </g>

  <ellipse class="aura" cx="640" cy="220" rx="400" ry="120" fill="url(#aura)"/>

  <g class="sweep" opacity="0.12">
    <rect x="0" y="0" width="220" height="440" fill="url(#sweep)"/>
  </g>

  <g class="orbit-1" opacity="0.18">
    <ellipse cx="640" cy="220" rx="320" ry="115" fill="none" stroke="#38BDF8" stroke-width="0.7" stroke-dasharray="2 9"/>
  </g>
  <g class="orbit-2" opacity="0.14">
    <ellipse cx="640" cy="220" rx="430" ry="160" fill="none" stroke="#A78BFA" stroke-width="0.7" stroke-dasharray="3 11"/>
  </g>
  <g class="orbit-3" opacity="0.10">
    <ellipse cx="640" cy="220" rx="540" ry="200" fill="none" stroke="#F472B6" stroke-width="0.7" stroke-dasharray="4 13"/>
  </g>

  <circle class="star-a" cx="180" cy="60" r="1.5" fill="#38BDF8"/>
  <circle class="star-b" cx="1120" cy="50" r="1.5" fill="#A78BFA"/>
  <circle class="star-c" cx="100" cy="380" r="1.5" fill="#F472B6"/>
  <circle class="star-a" cx="1180" cy="370" r="1.5" fill="#38BDF8"/>
  <circle class="star-d" cx="220" cy="180" r="1" fill="#A78BFA"/>
  <circle class="star-c" cx="1060" cy="200" r="1" fill="#F472B6"/>
  <circle class="star-b" cx="380" cy="80" r="1" fill="#A78BFA"/>
  <circle class="star-d" cx="900" cy="370" r="1" fill="#38BDF8"/>
  <circle class="star-a" cx="60" cy="240" r="0.8" fill="#A78BFA"/>
  <circle class="star-c" cx="1230" cy="250" r="0.8" fill="#F472B6"/>

  <g class="meta">
    <text x="640" y="55" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="14">P R O F I L E   ·   2 0 2 6</text>
    <line x1="430" y1="80" x2="555" y2="80" stroke="#334155" stroke-width="0.5"/>
    <line x1="725" y1="80" x2="850" y2="80" stroke="#334155" stroke-width="0.5"/>
  </g>

  <g class="name">
    <text x="640" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="78" font-weight="800" fill="url(#name)" text-anchor="middle" letter-spacing="3" filter="url(#glow)">YASSER HAMDAN</text>
  </g>

  <g class="underline">
    <line x1="500" y1="240" x2="780" y2="240" stroke="url(#name)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="640" cy="240" r="3" fill="#A78BFA" filter="url(#softGlow)"/>
  </g>

  <g class="tag">
    <text x="640" y="278" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#CBD5E1" text-anchor="middle" letter-spacing="7">PYTHON  ·  ODOO ERP  ·  FASTAPI  ·  AI AUTOMATION</text>
  </g>

  <g class="meta">
    <text x="640" y="306" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="4">DATA SCIENCE  @  USAL   —   GRADUATING JUNE 2026</text>
  </g>

  <g class="chip" filter="url(#softGlow)">
    <rect x="80" y="170" width="92" height="28" rx="14" fill="#0B1024" stroke="#38BDF8" stroke-width="0.7"/>
    <circle cx="98" cy="184" r="2" fill="#38BDF8"/>
    <text x="124" y="188" font-family="ui-monospace, monospace" font-size="10" fill="#7DD3FC" letter-spacing="2">PYTHON</text>
  </g>
  <g class="chip-c" filter="url(#softGlow)">
    <rect x="40" y="220" width="110" height="28" rx="14" fill="#0B1024" stroke="#10B981" stroke-width="0.7"/>
    <circle cx="58" cy="234" r="2" fill="#10B981"/>
    <text x="84" y="238" font-family="ui-monospace, monospace" font-size="10" fill="#6EE7B7" letter-spacing="2">LANGGRAPH</text>
  </g>
  <g class="chip-e" filter="url(#softGlow)">
    <rect x="110" y="270" width="92" height="28" rx="14" fill="#0B1024" stroke="#FB923C" stroke-width="0.7"/>
    <circle cx="128" cy="284" r="2" fill="#FB923C"/>
    <text x="154" y="288" font-family="ui-monospace, monospace" font-size="10" fill="#FDBA74" letter-spacing="2">PYTORCH</text>
  </g>

  <g class="chip-b" filter="url(#softGlow)">
    <rect x="1108" y="170" width="92" height="28" rx="14" fill="#0B1024" stroke="#A78BFA" stroke-width="0.7"/>
    <circle cx="1126" cy="184" r="2" fill="#A78BFA"/>
    <text x="1152" y="188" font-family="ui-monospace, monospace" font-size="10" fill="#C4B5FD" letter-spacing="2">ODOO</text>
  </g>
  <g class="chip-d" filter="url(#softGlow)">
    <rect x="1098" y="220" width="102" height="28" rx="14" fill="#0B1024" stroke="#F472B6" stroke-width="0.7"/>
    <circle cx="1116" cy="234" r="2" fill="#F472B6"/>
    <text x="1144" y="238" font-family="ui-monospace, monospace" font-size="10" fill="#F9A8D4" letter-spacing="2">FASTAPI</text>
  </g>
  <g class="chip-f" filter="url(#softGlow)">
    <rect x="1130" y="270" width="80" height="28" rx="14" fill="#0B1024" stroke="#22D3EE" stroke-width="0.7"/>
    <circle cx="1148" cy="284" r="2" fill="#22D3EE"/>
    <text x="1170" y="288" font-family="ui-monospace, monospace" font-size="10" fill="#67E8F9" letter-spacing="2">REACT</text>
  </g>

  <g class="status" transform="translate(640, 360)">
    <rect x="-130" y="-15" width="260" height="30" rx="15" fill="#022C22" stroke="#10B981" stroke-width="0.7" opacity="0.6"/>
    <circle cx="-105" cy="0" r="4" fill="#22C55E" class="live"/>
    <circle cx="-105" cy="0" r="9" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.4" class="live"/>
    <text x="10" y="4" font-family="ui-monospace, monospace" font-size="10" fill="#86EFAC" text-anchor="middle" letter-spacing="3">OPEN TO WORK  ·  JUNE 2026</text>
  </g>

  <g class="meta" stroke="#334155" stroke-width="0.6" fill="none">
    <path d="M 24 24 L 24 50 L 50 50"/>
    <path d="M 1256 24 L 1256 50 L 1230 50"/>
    <path d="M 24 416 L 24 390 L 50 390"/>
    <path d="M 1256 416 L 1256 390 L 1230 390"/>
  </g>
</svg>
