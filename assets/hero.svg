<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 01 — Subject: Yasser Hamdan">
  <!--
    PLATE 01 / SUBJECT
    The subject rendered as a labelled component on a drafting plate.
    Single typeface (IBM Plex Mono with system mono fallbacks).
    Two devices break the cleanliness deliberately:
    1. one rotated marginal note in the lower-left
    2. the orange "operating" dot has a 2.4s breathing animation —
       the only motion on the page.
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <!-- vellum (drafting paper) -->
  <rect width="1280" height="560" fill="#EDE6D6"/>

  <!-- outer plate border (ink hairline) -->
  <rect x="20" y="20" width="1240" height="520" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <!-- inner working frame (graphite, dashed — drafting convention) -->
  <rect x="34" y="34" width="1212" height="492" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <!-- corner registration / crop marks (drafting convention) -->
  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 540 L 28 540 M 20 532 L 20 548"/>
    <path d="M 1252 540 L 1268 540 M 1260 532 L 1260 548"/>
  </g>

  <!-- ============ TOP LEFT: plate header ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">PLATE  01  /  SUBJECT</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.8"/>
    <text class="mono" y="36" font-size="12" font-weight="500" letter-spacing="1.5" fill="#5C6A78">subject as labelled component</text>
  </g>

  <!-- ============ TOP RIGHT: drawn / scale / sheet stamp ============ -->
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">DRAWN  ⋅  2026-06</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SCALE  ⋅  1:1</text>
    <text class="mono" y="36" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  1  /  7</text>
  </g>

  <!-- thin separator under top strip -->
  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- ============ CENTER: subject component ============ -->
  <!-- Component frame (the name as a labelled drawing element) -->
  <g transform="translate(76, 230)">
    <!-- thin hairline frame -->
    <rect x="0" y="0" width="700" height="120" fill="none" stroke="#0B1F33" stroke-width="0.7"/>
    <!-- corner ticks (extension lines, drafting convention) -->
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="0"   y1="-8"  x2="0"   y2="8"/>
      <line x1="700" y1="-8"  x2="700" y2="8"/>
      <line x1="0"   y1="112" x2="0"   y2="128"/>
      <line x1="700" y1="112" x2="700" y2="128"/>
    </g>
    <!-- the name -->
    <text class="mono" x="350" y="80" font-size="64" font-weight="700" letter-spacing="-1" fill="#0B1F33" text-anchor="middle">YASSER  HAMDAN</text>
    <!-- size dimension below (drafting convention) -->
    <text class="mono" x="350" y="148" font-size="11" font-weight="600" letter-spacing="3" fill="#5C6A78" text-anchor="middle">SUBJECT.001  /  COMPONENT</text>
  </g>

  <!-- ============ LEADER LINE → annotation block ============ -->
  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <!-- terminator dot anchored to component right edge -->
    <circle cx="776" cy="290" r="2.4" fill="#0B1F33"/>
    <!-- right-then-up elbow -->
    <line x1="776" y1="290" x2="836" y2="290"/>
    <line x1="836" y1="290" x2="836" y2="232"/>
    <line x1="836" y1="232" x2="892" y2="232"/>
  </g>

  <!-- ============ ANNOTATION BLOCK A1 ============ -->
  <g transform="translate(892, 196)">
    <!-- annotation card (light box) -->
    <rect x="-12" y="-22" width="320" height="186" fill="#EDE6D6" stroke="#0B1F33" stroke-width="0.7"/>
    <!-- header -->
    <text class="mono" font-size="11" font-weight="700" letter-spacing="2.5" fill="#5C6A78">ANNOT.A1  /  SUBJECT</text>
    <line x1="0" y1="8" x2="240" y2="8" stroke="#5C6A78" stroke-width="0.4"/>

    <!-- field rows -->
    <g class="mono" font-size="13" fill="#0B1F33">
      <!-- TYPE -->
      <text y="36"  font-weight="700" letter-spacing="2.5">TYPE</text>
      <text y="36"  x="92" font-weight="500">developer  /  data sci.  /  ERP</text>

      <!-- STATE -->
      <text y="60"  font-weight="700" letter-spacing="2.5">STATE</text>
      <text y="60"  x="92" font-weight="500">operating</text>
      <circle cx="184" cy="56" r="4.2" fill="#E25E1E" class="live"/>

      <!-- AVAIL -->
      <text y="84"  font-weight="700" letter-spacing="2.5">AVAIL</text>
      <text y="84"  x="92" font-weight="500">2026-06  (June)</text>

      <!-- LOC -->
      <text y="108" font-weight="700" letter-spacing="2.5">LOC</text>
      <text y="108" x="92" font-weight="500">Beirut,  LB</text>

      <!-- LANG -->
      <text y="132" font-weight="700" letter-spacing="2.5">LANG</text>
      <text y="132" x="92" font-weight="500">AR  ·  EN  ·  FR</text>
    </g>
  </g>

  <!-- ============ MARGINAL NOTE (rotated, hand-set voice) ============ -->
  <g transform="translate(70, 432) rotate(-1.6)">
    <text class="mono" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">— subject available from June 2026.  open to ERP / Python / AI</text>
    <text class="mono" y="17" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">  engagements.  graduating BSc Data Science (USAL) the same month.</text>
  </g>

  <!-- ============ BOTTOM STRIP: index + title block ============ -->
  <line x1="48" y1="488" x2="1232" y2="488" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- bottom-left: file index -->
  <g transform="translate(56, 510)">
    <text class="mono" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33">Y-H  ⋅  BRT  ⋅  2026</text>
  </g>
  <!-- bottom-center: file path -->
  <text class="mono" x="640" y="510" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">FILE  /  github.com  /  hamdanyasser  /  README.md</text>
  <!-- bottom-right: title block -->
  <g transform="translate(1224, 510)" text-anchor="end">
    <text class="mono" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33">SUBJECT.001  /  1:1  /  SHEET 1</text>
  </g>
</svg>
