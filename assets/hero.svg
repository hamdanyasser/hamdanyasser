<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python · Odoo ERP · FastAPI · AI Automation">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0F1729"/>
      <stop offset="60%" stop-color="#070B16"/>
      <stop offset="100%" stop-color="#020410"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInSoft { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes drift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes scanLine { 0% { transform: translateX(-1200px); } 100% { transform: translateX(1200px); } }
    @keyframes blinkDot { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.3; } }

    .name-text { animation: fadeIn 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
    .tagline-text { animation: fadeIn 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards; opacity: 0; }
    .meta-text { animation: fadeInSoft 1.6s ease-out 1.2s forwards; opacity: 0; }
    .status-group { animation: fadeInSoft 1.4s ease-out 1.6s forwards; opacity: 0; }

    .star-a { animation: pulse 4s ease-in-out infinite; }
    .star-b { animation: pulse 3s ease-in-out infinite 0.7s; }
    .star-c { animation: pulse 5s ease-in-out infinite 1.4s; }

    .orbit-1 { transform-origin: 600px 200px; animation: spin 90s linear infinite; }
    .orbit-2 { transform-origin: 600px 200px; animation: spinReverse 110s linear infinite; }

    .chip { animation: drift 5s ease-in-out infinite; }
    .chip-b { animation: drift 5s ease-in-out infinite 1.2s; }
    .chip-c { animation: drift 5s ease-in-out infinite 2.4s; }
    .chip-d { animation: drift 5s ease-in-out infinite 3.6s; }

    .scan { animation: scanLine 8s ease-in-out infinite; }
    .live-dot { animation: blinkDot 2s ease-in-out infinite; }
  </style>

  <!-- Background layers -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#60A5FA" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>

  <!-- Sweeping scan line -->
  <g class="scan" opacity="0.08">
    <rect x="0" y="0" width="180" height="400" fill="url(#lineGrad)"/>
  </g>

  <!-- Orbital paths -->
  <g class="orbit-1" opacity="0.15">
    <ellipse cx="600" cy="200" rx="320" ry="120" fill="none" stroke="#60A5FA" stroke-width="0.6" stroke-dasharray="2 8"/>
  </g>
  <g class="orbit-2" opacity="0.12">
    <ellipse cx="600" cy="200" rx="420" ry="155" fill="none" stroke="#A78BFA" stroke-width="0.6" stroke-dasharray="3 10"/>
  </g>

  <!-- Pulsing background stars -->
  <circle class="star-a" cx="180" cy="80" r="1.5" fill="#60A5FA"/>
  <circle class="star-b" cx="1020" cy="60" r="1.5" fill="#A78BFA"/>
  <circle class="star-c" cx="120" cy="340" r="1.5" fill="#F472B6"/>
  <circle class="star-a" cx="1080" cy="320" r="1.5" fill="#60A5FA"/>
  <circle class="star-b" cx="940" cy="160" r="1" fill="#A78BFA"/>
  <circle class="star-c" cx="260" cy="240" r="1" fill="#F472B6"/>
  <circle class="star-a" cx="850" cy="350" r="1" fill="#60A5FA"/>
  <circle class="star-b" cx="350" cy="60" r="1" fill="#A78BFA"/>

  <!-- Top label -->
  <g class="meta-text">
    <text x="600" y="80" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="8">PROFILE / 2026</text>
  </g>

  <!-- Decorative bracket lines -->
  <g class="meta-text">
    <line x1="350" y1="135" x2="430" y2="135" stroke="#475569" stroke-width="0.5"/>
    <line x1="770" y1="135" x2="850" y2="135" stroke="#475569" stroke-width="0.5"/>
  </g>

  <!-- Main name -->
  <g class="name-text">
    <text x="600" y="190" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="68" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="2" filter="url(#glow)">YASSER HAMDAN</text>
  </g>

  <!-- Subtitle line -->
  <g class="tagline-text">
    <text x="600" y="232" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#94A3B8" text-anchor="middle" letter-spacing="6">PYTHON  ·  ODOO ERP  ·  FASTAPI  ·  AI AUTOMATION</text>
  </g>

  <!-- Meta line -->
  <g class="meta-text">
    <text x="600" y="262" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="3">DATA SCIENCE @ USAL  —  GRADUATING JUNE 2026</text>
  </g>

  <!-- Floating tech chips -->
  <g class="chip" filter="url(#softGlow)">
    <rect x="100" y="175" width="84" height="26" rx="13" fill="#0F172A" stroke="#3B82F6" stroke-width="0.6" opacity="0.9"/>
    <text x="142" y="192" font-family="ui-monospace, monospace" font-size="10" fill="#60A5FA" text-anchor="middle" letter-spacing="2">PYTHON</text>
  </g>
  <g class="chip-b" filter="url(#softGlow)">
    <rect x="1015" y="175" width="84" height="26" rx="13" fill="#0F172A" stroke="#A78BFA" stroke-width="0.6" opacity="0.9"/>
    <text x="1057" y="192" font-family="ui-monospace, monospace" font-size="10" fill="#A78BFA" text-anchor="middle" letter-spacing="2">ODOO</text>
  </g>
  <g class="chip-c" filter="url(#softGlow)">
    <rect x="60" y="225" width="100" height="26" rx="13" fill="#0F172A" stroke="#10B981" stroke-width="0.6" opacity="0.9"/>
    <text x="110" y="242" font-family="ui-monospace, monospace" font-size="10" fill="#34D399" text-anchor="middle" letter-spacing="2">LANGGRAPH</text>
  </g>
  <g class="chip-d" filter="url(#softGlow)">
    <rect x="1040" y="225" width="90" height="26" rx="13" fill="#0F172A" stroke="#F472B6" stroke-width="0.6" opacity="0.9"/>
    <text x="1085" y="242" font-family="ui-monospace, monospace" font-size="10" fill="#F472B6" text-anchor="middle" letter-spacing="2">FASTAPI</text>
  </g>
  <g class="chip" filter="url(#softGlow)">
    <rect x="140" y="280" width="74" height="26" rx="13" fill="#0F172A" stroke="#FB923C" stroke-width="0.6" opacity="0.9"/>
    <text x="177" y="297" font-family="ui-monospace, monospace" font-size="10" fill="#FB923C" text-anchor="middle" letter-spacing="2">PYTORCH</text>
  </g>
  <g class="chip-b" filter="url(#softGlow)">
    <rect x="985" y="280" width="80" height="26" rx="13" fill="#0F172A" stroke="#22D3EE" stroke-width="0.6" opacity="0.9"/>
    <text x="1025" y="297" font-family="ui-monospace, monospace" font-size="10" fill="#22D3EE" text-anchor="middle" letter-spacing="2">REACT</text>
  </g>

  <!-- Status indicator -->
  <g class="status-group" transform="translate(530, 330)">
    <circle cx="0" cy="0" r="4" fill="#22C55E" class="live-dot"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.4"/>
    <text x="14" y="4" font-family="ui-monospace, monospace" font-size="11" fill="#86EFAC" letter-spacing="3">OPEN TO WORK  —  JUNE 2026</text>
  </g>

  <!-- Bottom corners decorative -->
  <g class="meta-text" stroke="#334155" stroke-width="0.5" fill="none">
    <path d="M 30 30 L 30 50 L 50 50"/>
    <path d="M 1170 30 L 1170 50 L 1150 50"/>
    <path d="M 30 370 L 30 350 L 50 350"/>
    <path d="M 1170 370 L 1170 350 L 1150 350"/>
  </g>
</svg>
