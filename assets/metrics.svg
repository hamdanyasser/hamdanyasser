<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Plate 05 — Operating Metrics">
  <!--
    PLATE 05 / OPERATING METRICS
    Hand-drawn metrics plate. No external API widgets. Numbers are
    static and authored as part of the design system. Four stamp
    boxes for top-line metrics. Language mix as horizontal bar chart
    in ink on vellum, drafting-style.
  -->
  <style>
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live { animation: breathe 2.4s ease-in-out infinite; }
  </style>

  <rect width="1280" height="620" fill="#EDE6D6"/>
  <rect x="20" y="20" width="1240" height="580" fill="none" stroke="#0B1F33" stroke-width="0.8"/>
  <rect x="34" y="34" width="1212" height="552" fill="none" stroke="#5C6A78" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.55"/>

  <g stroke="#0B1F33" stroke-width="0.7" fill="none">
    <path d="M 12 20 L 28 20 M 20 12 L 20 28"/>
    <path d="M 1252 20 L 1268 20 M 1260 12 L 1260 28"/>
    <path d="M 12 600 L 28 600 M 20 592 L 20 608"/>
    <path d="M 1252 600 L 1268 600 M 1260 592 L 1260 608"/>
  </g>

  <!-- ============ TOP STRIP ============ -->
  <g transform="translate(56, 70)">
    <text class="mono" font-size="18" font-weight="700" letter-spacing="3.6" fill="#0B1F33">OPERATING METRICS  /  READOUT</text>
    <line x1="0" y1="14" x2="280" y2="14" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="36" font-size="12" font-weight="500" letter-spacing="1.5" fill="#5C6A78">throughput  ⋅  surface area  ⋅  language mix  ⋅  trailing 12 months</text>
  </g>
  <g transform="translate(1224, 70)" text-anchor="end">
    <text class="mono" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">DRAWN  ⋅  2026-06</text>
    <text class="mono" y="18" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SCALE  ⋅  1:1</text>
    <text class="mono" y="36" font-size="12" font-weight="600" letter-spacing="2.4" fill="#0B1F33">SHEET  ⋅  5  /  7</text>
  </g>

  <line x1="48" y1="138" x2="1232" y2="138" stroke="#0B1F33" stroke-width="0.5"/>

  <!-- ============ FOUR METRIC STAMPS ============ -->
  <!-- 01: Contributions -->
  <g>
    <rect x="48" y="170" width="284" height="138" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="48"  y1="162" x2="48"  y2="178"/>
      <line x1="332" y1="162" x2="332" y2="178"/>
      <line x1="48"  y1="300" x2="48"  y2="316"/>
      <line x1="332" y1="300" x2="332" y2="316"/>
    </g>
    <text class="mono" x="64"  y="194" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">METRIC.01</text>
    <text class="mono" x="316" y="194" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1F33" text-anchor="end">CONTRIBUTIONS</text>
    <line x1="64" y1="206" x2="316" y2="206" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="190" y="262" font-size="56" font-weight="700" letter-spacing="-1" fill="#0B1F33" text-anchor="middle">485</text>
    <text class="mono" x="190" y="290" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">trailing 12 months</text>
  </g>

  <!-- 02: Repositories -->
  <g>
    <rect x="348" y="170" width="284" height="138" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="348" y1="162" x2="348" y2="178"/>
      <line x1="632" y1="162" x2="632" y2="178"/>
      <line x1="348" y1="300" x2="348" y2="316"/>
      <line x1="632" y1="300" x2="632" y2="316"/>
    </g>
    <text class="mono" x="364" y="194" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">METRIC.02</text>
    <text class="mono" x="616" y="194" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1F33" text-anchor="end">REPOSITORIES</text>
    <line x1="364" y1="206" x2="616" y2="206" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="490" y="262" font-size="56" font-weight="700" letter-spacing="-1" fill="#0B1F33" text-anchor="middle">67</text>
    <text class="mono" x="490" y="290" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">public  ⋅  on profile</text>
  </g>

  <!-- 03: Internships -->
  <g>
    <rect x="648" y="170" width="284" height="138" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="648" y1="162" x2="648" y2="178"/>
      <line x1="932" y1="162" x2="932" y2="178"/>
      <line x1="648" y1="300" x2="648" y2="316"/>
      <line x1="932" y1="300" x2="932" y2="316"/>
    </g>
    <text class="mono" x="664" y="194" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">METRIC.03</text>
    <text class="mono" x="916" y="194" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1F33" text-anchor="end">INTERNSHIPS</text>
    <line x1="664" y1="206" x2="916" y2="206" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="790" y="262" font-size="56" font-weight="700" letter-spacing="-1" fill="#0B1F33" text-anchor="middle">02</text>
    <text class="mono" x="790" y="290" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">XPERTBOT  ⋅  MOBILE ARTS</text>
  </g>

  <!-- 04: Modules in service -->
  <g>
    <rect x="948" y="170" width="284" height="138" fill="#EDE6D6" stroke="#0B1F33" stroke-width="1"/>
    <g stroke="#0B1F33" stroke-width="0.7">
      <line x1="948"  y1="162" x2="948"  y2="178"/>
      <line x1="1232" y1="162" x2="1232" y2="178"/>
      <line x1="948"  y1="300" x2="948"  y2="316"/>
      <line x1="1232" y1="300" x2="1232" y2="316"/>
    </g>
    <text class="mono" x="964"  y="194" font-size="11" font-weight="700" letter-spacing="3" fill="#5C6A78">METRIC.04</text>
    <text class="mono" x="1216" y="194" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1F33" text-anchor="end">FEATURED MODULES</text>
    <line x1="964" y1="206" x2="1216" y2="206" stroke="#5C6A78" stroke-width="0.4"/>
    <text class="mono" x="1090" y="262" font-size="56" font-weight="700" letter-spacing="-1" fill="#0B1F33" text-anchor="middle">06</text>
    <g transform="translate(1090, 290)">
      <text class="mono" x="0" y="0" font-size="11" font-weight="500" letter-spacing="2" fill="#5C6A78" text-anchor="middle">01 IN SERVICE</text>
      <circle cx="60" cy="-3" r="3.5" fill="#E25E1E" class="live"/>
    </g>
  </g>

  <!-- ============ LANGUAGE MIX BAR CHART ============ -->
  <g transform="translate(56, 354)">
    <text class="mono" font-size="14" font-weight="700" letter-spacing="2.8" fill="#0B1F33">LANGUAGE MIX  /  PRIMARY 5</text>
    <line x1="0" y1="10" x2="280" y2="10" stroke="#0B1F33" stroke-width="0.7"/>
    <text class="mono" y="32" font-size="11" font-weight="500" letter-spacing="1.2" fill="#5C6A78">queried from GitHub API across all public repositories  ⋅  byte count</text>
  </g>

  <!-- bar rows (5 languages, scale: 1% = 14px) -->
  <g class="mono" font-size="13" font-weight="500" fill="#0B1F33">
    <!-- Java 29% -->
    <text x="56"  y="430" font-weight="700" letter-spacing="2">JAVA</text>
    <rect x="190" y="416" width="406" height="20" fill="#0B1F33"/>
    <text x="608" y="430" font-weight="700" letter-spacing="1.5">29%</text>

    <!-- Python 18% -->
    <text x="56"  y="464" font-weight="700" letter-spacing="2">PYTHON</text>
    <rect x="190" y="450" width="252" height="20" fill="#0B1F33"/>
    <text x="454" y="464" font-weight="700" letter-spacing="1.5">18%</text>

    <!-- JavaScript 11% -->
    <text x="56"  y="498" font-weight="700" letter-spacing="2">JAVASCRIPT</text>
    <rect x="190" y="484" width="154" height="20" fill="#0B1F33"/>
    <text x="356" y="498" font-weight="700" letter-spacing="1.5">11%</text>

    <!-- EJS 10% -->
    <text x="56"  y="532" font-weight="700" letter-spacing="2">EJS</text>
    <rect x="190" y="518" width="140" height="20" fill="#0B1F33"/>
    <text x="342" y="532" font-weight="700" letter-spacing="1.5">10%</text>

    <!-- TypeScript 8% -->
    <text x="56"  y="566" font-weight="700" letter-spacing="2">TYPESCRIPT</text>
    <rect x="190" y="552" width="112" height="20" fill="#0B1F33"/>
    <text x="314" y="566" font-weight="700" letter-spacing="1.5">8%</text>
  </g>

  <!-- ============ MARGINAL NOTE ============ -->
  <g transform="translate(640, 444) rotate(-1.4)">
    <text class="mono" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">— Java leads on bytes because the archive includes four years</text>
    <text class="mono" y="17" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">  of coursework.  current work is Python first.  remaining 24%</text>
    <text class="mono" y="34" font-size="12" font-weight="500" letter-spacing="0.4" fill="#5C6A78" font-style="italic">  is HTML / CSS, Jupyter, C#, TeX, and small files.</text>
  </g>

  <!-- ============ BOTTOM STRIP ============ -->
  <line x1="48" y1="582" x2="1232" y2="582" stroke="#0B1F33" stroke-width="0.5"/>
  <text class="mono" x="56"   y="600" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33">Y-H  ⋅  BRT  ⋅  2026</text>
  <text class="mono" x="1224" y="600" font-size="11" font-weight="700" letter-spacing="2.8" fill="#0B1F33" text-anchor="end">METRICS.001  /  SHEET 5</text>
</svg>
