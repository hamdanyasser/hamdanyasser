<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentMDk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="nameMDk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="bgGlowMDk" cx="50%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#1A2238" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTealMDk" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#14B8A6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink     { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes pulse-rule { 0%,100% { transform: scaleX(1); opacity: 0.9; } 50% { transform: scaleX(1.08); opacity: 1; } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .live   { animation: breathe 2.2s ease-in-out infinite; }
    .blink  { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .rotate-slow { animation: rotate-slow 60s linear infinite; transform-origin: 480px 180px; }
  </style>

  <rect width="600" height="680" fill="#0D1117"/>
  <rect width="600" height="680" fill="url(#bgGlowMDk)"/>
  <circle cx="100" cy="600" r="260" fill="url(#glowTealMDk)"/>

  <!-- Floating dots -->
  <circle class="float-a" cx="510" cy="500" r="6"  fill="#FF6B35" opacity="0.6"/>
  <circle class="float-b" cx="60"  cy="320" r="4"  fill="#14B8A6" opacity="0.7"/>
  <circle class="float-a" cx="540" cy="630" r="5"  fill="#14B8A6" opacity="0.45"/>
  <rect   class="float-b" x="40" y="540" width="9" height="9" fill="#FF6B35" opacity="0.55" transform="rotate(45 44 544)"/>

  <!-- Status pill -->
  <g transform="translate(40, 50)">
    <rect width="220" height="40" rx="20" fill="#FF6B35"/>
    <circle cx="22" cy="20" r="6" fill="#0D1117" class="live"/>
    <text class="sans" x="40" y="26" font-size="14" font-weight="800" fill="#0D1117" letter-spacing="1.4">AVAILABLE NOW</text>
  </g>

  <!-- Meta line -->
  <text class="mono" x="40" y="128" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1.5">BEIRUT, LB  ·  USAL  ·  3 LANGUAGES</text>

  <!-- Y mark -->
  <g>
    <g class="rotate-slow">
      <circle cx="480" cy="180" r="80" fill="none" stroke="#F5F1E8" stroke-width="1" stroke-dasharray="3 7" opacity="0.28"/>
      <circle cx="480" cy="100" r="3" fill="#14B8A6"/>
    </g>
    <circle cx="480" cy="180" r="56" fill="#F5F1E8"/>
    <circle cx="480" cy="180" r="56" fill="none" stroke="#FF6B35" stroke-width="3"/>
    <text class="sans" x="480" y="202" font-size="56" font-weight="800" fill="#0D1117" text-anchor="middle" letter-spacing="-2">Y</text>
  </g>

  <!-- Two-line name -->
  <text class="sans" x="40" y="338" font-size="86" font-weight="800" fill="url(#nameMDk)" letter-spacing="-3">Yasser</text>
  <g>
    <text class="sans" x="40" y="424" font-size="86" font-weight="800" fill="url(#nameMDk)" letter-spacing="-3">Hamdan.</text>
    <rect x="375" y="356" width="14" height="64" fill="#FF6B35" class="blink"/>
  </g>

  <!-- Accent rule -->
  <rect x="40" y="448" width="150" height="6" rx="3" fill="url(#accentMDk)" class="pulse-rule"/>

  <!-- Tagline -->
  <text class="sans" x="40" y="500" font-size="22" font-weight="700" fill="#F5F1E8">Python  ·  Odoo ERP</text>
  <text class="sans" x="40" y="528" font-size="22" font-weight="500" fill="#14B8A6" font-style="italic">AI Automation Engineer.</text>

  <!-- Bottom rule + tagline -->
  <line x1="40" y1="600" x2="560" y2="600" stroke="#F5F1E8" stroke-width="1.2"/>
  <text class="mono" x="300" y="638" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="2" text-anchor="middle">SHIPPED 1 IN PROD  ·  6 PERSONAL BUILDS  ·  2 INTERNSHIPS</text>
</svg>
