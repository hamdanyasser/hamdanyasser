<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 820" width="600" height="820" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Yasser Hamdan — Python and Odoo ERP developer">
  <defs>
    <linearGradient id="accentMDk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="nameMDk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="bgGlowMDk" cx="50%" cy="20%" r="65%">
      <stop offset="0%"   stop-color="#1A2238" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTealDk" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#14B8A6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink    { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes float-a  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes float-b  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes pulse-rule { 0%,100% { transform: scaleX(1); opacity: 0.9; } 50% { transform: scaleX(1.08); opacity: 1; } }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .live   { animation: breathe 2.2s ease-in-out infinite; }
    .blink  { animation: blink 1.1s steps(2) infinite; }
    .float-a { animation: float-a 5s ease-in-out infinite; transform-origin: center; }
    .float-b { animation: float-b 6s ease-in-out infinite; transform-origin: center; }
    .pulse-rule { animation: pulse-rule 3s ease-in-out infinite; transform-origin: left center; }
    .rotate-slow { animation: rotate-slow 60s linear infinite; transform-origin: 100px 200px; }
  </style>

  <rect width="600" height="820" fill="#0D1117"/>
  <rect width="600" height="820" fill="url(#bgGlowMDk)"/>
  <circle cx="500" cy="650" r="280" fill="url(#glowTealDk)"/>

  <!-- Decorative floating shapes -->
  <circle class="float-a" cx="510" cy="100"  r="6"  fill="#FF6B35" opacity="0.55"/>
  <circle class="float-b" cx="80"  cy="270"  r="4"  fill="#14B8A6" opacity="0.7"/>
  <circle class="float-a" cx="540" cy="540"  r="8"  fill="#F5F1E8" opacity="0.10"/>
  <rect   class="float-b" x="40"  y="700" width="10" height="10" fill="#FF6B35" opacity="0.55" transform="rotate(45 45 705)"/>
  <circle class="float-a" cx="560" cy="780" r="5"  fill="#14B8A6" opacity="0.45"/>

  <!-- Slow rotating orbit around Y mark -->
  <g class="rotate-slow">
    <circle cx="100" cy="200" r="62" fill="none" stroke="#F5F1E8" stroke-width="1" stroke-dasharray="2 6" opacity="0.30"/>
    <circle cx="100" cy="138" r="3" fill="#FF6B35"/>
  </g>

  <!-- Status pill -->
  <g transform="translate(40, 50)">
    <rect width="260" height="42" rx="21" fill="#FF6B35"/>
    <circle cx="24" cy="21" r="6" fill="#0D1117" class="live"/>
    <text class="sans" x="44" y="27" font-size="14" font-weight="800" fill="#0D1117" letter-spacing="1.4">OPEN TO WORK · AVAILABLE NOW</text>
  </g>

  <!-- Top meta -->
  <text class="mono" x="40" y="130" font-size="13" font-weight="600" fill="#94A3B8" letter-spacing="1.4">BEIRUT, LB  ·  DATA SCIENCE @ USAL  ·  GRAD 2026</text>

  <!-- Y monogram -->
  <g>
    <circle cx="100" cy="200" r="48" fill="#F5F1E8"/>
    <circle cx="100" cy="200" r="48" fill="none" stroke="#FF6B35" stroke-width="3"/>
    <text class="sans" x="100" y="220" font-size="48" font-weight="800" fill="#0D1117" text-anchor="middle" letter-spacing="-2">Y</text>
  </g>

  <!-- Big name -->
  <text class="sans" x="40" y="328" font-size="84" font-weight="800" fill="url(#nameMDk)" letter-spacing="-3">Yasser</text>
  <g>
    <text class="sans" x="40" y="402" font-size="84" font-weight="800" fill="url(#nameMDk)" letter-spacing="-3">Hamdan</text>
    <rect x="358" y="338" width="14" height="64" fill="#FF6B35" class="blink"/>
  </g>

  <!-- Animated accent rule -->
  <rect x="40" y="424" width="160" height="6" rx="3" fill="url(#accentMDk)" class="pulse-rule"/>

  <!-- Tagline -->
  <text class="sans" x="40" y="476" font-size="22" font-weight="700" fill="#F5F1E8">Python  ·  Odoo ERP</text>
  <text class="sans" x="40" y="504" font-size="22" font-weight="500" fill="#14B8A6" font-style="italic">AI Automation Engineer.</text>

  <!-- Pull quote -->
  <g transform="translate(40, 544)">
    <line x1="0" y1="0" x2="0" y2="116" stroke="url(#accentMDk)" stroke-width="5"/>
    <text class="sans" x="22" y="26" font-size="17" font-weight="700" fill="#F5F1E8">Shipped 1 production Odoo</text>
    <text class="sans" x="22" y="48" font-size="17" font-weight="700" fill="#F5F1E8">module solo at Mobile Arts.</text>
    <text class="sans" x="22" y="76" font-size="15" font-weight="500" fill="#94A3B8">10 Plotly dashboards · XpertBot.</text>
    <text class="sans" x="22" y="96" font-size="15" font-weight="500" fill="#94A3B8">Six personal builds.</text>
  </g>

  <!-- Stats row -->
  <line x1="40" y1="700" x2="560" y2="700" stroke="#F5F1E8" stroke-width="1.4"/>
  <g class="sans" font-weight="800" fill="#F5F1E8" text-anchor="middle">
    <text x="100" y="750" font-size="40">3</text>
    <text x="225" y="750" font-size="40">6</text>
    <text x="350" y="750" font-size="40">2</text>
    <text x="495" y="750" font-size="40" fill="#FF6B35">1</text>
  </g>
  <g class="mono" font-size="11" font-weight="700" fill="#94A3B8" text-anchor="middle" letter-spacing="1.5">
    <text x="100" y="776">YEARS</text>
    <text x="225" y="776">SHIPS</text>
    <text x="350" y="776">INTERNS</text>
    <text x="495" y="776" fill="#FF6B35">IN PROD</text>
  </g>
  <line x1="40" y1="794" x2="560" y2="794" stroke="#F5F1E8" stroke-width="1.4"/>
</svg>
